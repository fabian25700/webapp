<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Digitaler Reisepass</title>
    <script src="daten.js"></script>
    <style>
        :root {
            /* Ein weiches, dezentes Grün für den Seitenhintergrund */
            --passport-green-soft: #e8f2e9; 
            --ink-dark: #1a3a16;
            --border-page: #d1ddd2;
            --text-secondary: #7a8c7b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid #222;
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: #222; border: 1px solid #333;
            text-decoration: none; color: white;
        }

        .book-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            height: 100vh;
            padding-top: 90px;
            scrollbar-width: none;
        }
        .book-container::-webkit-scrollbar { display: none; }

        .page {
            flex: 0 0 100vw;
            scroll-snap-align: start;
            display: flex; justify-content: center; padding: 10px;
        }

        .page-inner {
            width: 100%; max-width: 380px; height: 620px;
            background: var(--passport-green-soft);
            border-radius: 12px; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            padding: 20px 15px;
            border: 1px solid var(--border-page);
            display: flex; flex-direction: column;
        }

        /* Bundesadler Wasserzeichen */
        .page-inner::before {
            content: ' ';
            position: absolute; top: 50%; left: 50%;
            width: 220px; height: 220px;
            transform: translate(-50%, -50%);
            background: url('https://upload.wikimedia.org/wikipedia/commons/d/da/Coat_of_arms_of_Germany.svg') no-repeat center;
            background-size: contain;
            opacity: 0.04; pointer-events: none;
        }

        .page-header {
            text-align: center; font-size: 0.65rem; font-weight: 700;
            color: var(--text-secondary); text-transform: uppercase;
            letter-spacing: 2px; border-bottom: 1px solid var(--border-page);
            padding-bottom: 10px; margin-bottom: 15px;
        }

        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px; flex: 1;
            align-content: center;
        }

        .stamp-slot {
            display: flex; align-items: center; justify-content: center;
            min-height: 100px;
        }

        .stamp {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            mix-blend-mode: multiply; opacity: 0.8;
        }

        .stamp-circle { border: 2.2px solid; border-radius: 50%; width: 78px; height: 78px; }
        .stamp-rect { border: 2.2px solid; border-radius: 5px; width: 88px; height: 58px; }
        .stamp-hex { border: 2.2px solid; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); width: 78px; height: 78px; }

        .stamp .land { font-weight: 800; font-size: 0.55rem; text-transform: uppercase; text-align: center; }
        .stamp .jahr { font-size: 0.9rem; font-weight: 900; border-top: 1px solid; border-bottom: 1px solid; margin: 1px 0; }
        .stamp .type { font-size: 0.4rem; letter-spacing: 1px; font-weight: 700; }

        .page-footer {
            text-align: center; font-size: 0.7rem; font-weight: 800;
            color: var(--ink-dark); text-transform: uppercase;
            letter-spacing: 1.5px; margin-top: 15px;
            padding-top: 10px; border-top: 1px solid var(--border-page);
        }
    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1 style="color: white; font-size: 1.1rem; flex: 1; text-align: center; margin-right: 36px;">Reisepass</h1>
    </header>

    <div class="book-container" id="book-container"></div>

    <script>
        const colors = ['#1e3a8a', '#991b1b', '#064e3b', '#581c87', '#78350f'];
        const shapes = ['circle', 'rect', 'hex'];

        function renderPassport() {
            const container = document.getElementById('book-container');
            const reisenFiltered = MEINE_REISEN.filter(r => r.Land !== "Deutschland");
            
            reisenFiltered.sort((a, b) => (a["erste Einreise"] || 2026) - (b["erste Einreise"] || 2026));

            const stampsPerPage = 9;
            const totalPages = Math.ceil(reisenFiltered.length / stampsPerPage);

            for (let p = 0; p < totalPages; p++) {
                const page = document.createElement('div');
                page.className = 'page';
                
                const pageInner = document.createElement('div');
                pageInner.className = 'page-inner';
                
                const start = p * stampsPerPage;
                const pageItems = reisenFiltered.slice(start, start + stampsPerPage);

                pageInner.innerHTML = `
                    <div class="page-header">Visa - Seite ${p + 1}</div>
                    <div class="stamp-grid" id="grid-${p}"></div>
                    <div class="page-footer">Fabian Geisbüsch</div>
                `;
                
                page.appendChild(pageInner);
                container.appendChild(page);

                const grid = pageInner.querySelector(`#grid-${p}`);
                pageItems.forEach(reise => {
                    const slot = document.createElement('div');
                    slot.className = 'stamp-slot';
                    slot.appendChild(createStamp(reise));
                    grid.appendChild(slot);
                });
            }
        }

        function createStamp(reise) {
            const stampDiv = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            
            stampDiv.className = `stamp stamp-${shape}`;
            stampDiv.style.color = color;
            stampDiv.style.borderColor = color;

            const rotation = Math.floor(Math.random() * 24) - 12; 
            const jitterX = Math.floor(Math.random() * 8) - 4;
            const jitterY = Math.floor(Math.random() * 8) - 4;
            
            stampDiv.style.transform = `rotate(${rotation}deg) translate(${jitterX}px, ${jitterY}px)`;

            stampDiv.innerHTML = `
                <div class="type">ENTRY</div>
                <div class="land">${reise.Land}</div>
                <div class="jahr">${reise["erste Einreise"] || '2026'}</div>
                <div class="type">DEPARTURE</div>
            `;

            return stampDiv;
        }

        window.onload = renderPassport;
    </script>
</body>
</html>
