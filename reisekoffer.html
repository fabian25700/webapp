<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reisekoffer | Fabian Geisbüsch</title>
    <style>
        :root {
            --accent: #e67e22;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --alu-base: #bdc3c7;
            --alu-dark: #7f8c8d;
            --hardware-black: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --text-primary: #f1f5f9;
                --border: #2d3f55;
                --border-light: #253347;
                --alu-base: #7f8c8d;
                --alu-dark: #2c3e50;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: var(--bg); color: var(--text-primary);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg);
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-light);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--surface); border: 1px solid var(--border);
            text-decoration: none; color: var(--text-primary);
        }

        header h1 { font-size: 1.15rem; font-weight: 800; }

        .viewport { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .suitcase-container { position: relative; display: flex; flex-direction: column; align-items: center; }

        @media (max-width: 600px) {
            .suitcase-container { transform: rotate(-90deg) scale(0.6); }
        }

        /* Teleskopgriff */
        .telescope-system {
            width: 160px; height: 60px;
            position: relative; margin-bottom: -15px; /* Leicht hinter den Koffer schieben */
            z-index: 0; /* Hinter den Koffer-Body */
        }
        .rail {
            position: absolute; width: 16px; height: 100%;
            background: linear-gradient(to right, #333, #555, #333);
            border-radius: 4px 4px 0 0; border: 1px solid #1a1a1a;
        }
        .rail.left { left: 25px; }
        .rail.right { right: 25px; }
        .handle-bar {
            position: absolute; top: 0; left: 10px; right: 10px; height: 22px;
            background: linear-gradient(to bottom, #2a2a2a, #0a0a0a, #000);
            border-radius: 8px; border: 1px solid #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Koffer Korpus */
        .suitcase-body {
            width: 820px; height: 520px;
            background: var(--alu-base);
            border: 14px solid var(--alu-dark);
            border-radius: 54px;
            position: relative;
            z-index: 1; /* Vor dem Teleskopgriff */
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            background-image: repeating-linear-gradient(90deg, transparent 0, transparent 40px, rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 42px);
        }

        /* Seitengriff Upgrade: Abgehoben */
        .handle-side-system {
            position: absolute; right: -35px; top: 50%;
            transform: translateY(-50%);
            display: flex; align-items: center;
        }
        /* Montageplatte auf dem Koffer */
        .handle-mount {
            width: 12px; height: 140px;
            background: var(--hardware-black);
            border-radius: 0 6px 6px 0;
            border: 1px solid #000;
        }
        /* Der eigentliche Griff */
        .handle-side {
            width: 40px; height: 180px;
            background: linear-gradient(to right, #111, #333, #111);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #000;
            margin-left: -5px; /* Leicht über die Montageplatte schieben */
            box-shadow: 10px 0 20px rgba(0,0,0,0.4); /* Starker Schatten nach außen */
        }
        .handle-side::after {
            content: "RIMOWA KÖLN";
            color: rgba(255,255,255,0.25);
            font-size: 10px; font-weight: 900; letter-spacing: 3px;
            transform: rotate(90deg); white-space: nowrap;
        }

        /* Rollen Upgrade: Gehäuse auf dem Koffer */
        .wheel-area {
            position: absolute; left: -25px; top: 70px; bottom: 70px;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 10; /* Vor dem Koffer-Rand */
        }
        /* Radkasten */
        .wheel-housing {
            width: 45px; height: 110px;
            background: var(--hardware-black);
            border-radius: 20px 0 0 20px;
            border: 1px solid #000;
            display: flex; align-items: center; justify-content: flex-start;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.3);
        }
        /* Die Rolle selbst */
        .wheel-tire {
            width: 40px; height: 90px;
            background: linear-gradient(to bottom, #000, #222, #000);
            border-radius: 15px 0 0 15px;
            border-left: 14px solid #000;
            margin-left: -10px; /* Rolle aus dem Gehäuse schieben */
            box-shadow: inset 4px 0 6px rgba(255,255,255,0.1);
        }

        /* Nieten */
        .niete {
            position: absolute; width: 8px; height: 8px;
            background: radial-gradient(circle at 3px 3px, #bdc3c7, #7f8c8d);
            border-radius: 50%;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            z-index: 5;
        }

    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Reisekoffer</h1>
    </header>

    <div class="viewport">
        <div class="suitcase-container">
            <div class="telescope-system">
                <div class="rail left"></div>
                <div class="rail right"></div>
                <div class="handle-bar"></div>
            </div>

            <div class="suitcase-body" id="canvas">
                
                <div class="wheel-area">
                    <div class="wheel-housing">
                        <div class="wheel-tire"></div>
                    </div>
                    <div class="wheel-housing">
                        <div class="wheel-tire"></div>
                    </div>
                </div>

                <div class="handle-side-system">
                    <div class="handle-mount"></div>
                    <div class="handle-side"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        
        function placeRivets() {
            const w = 820;
            const h = 520;
            const step = 60; // Abstand zwischen Nieten

            // Horizontale Reihen
            for(let x = 60; x < w - 60; x += step) {
                addRivet(x, 15);      // Oben
                addRivet(x, h - 45);  // Unten
            }
            // Vertikale Reihen
            for(let y = 60; y < h - 60; y += step) {
                addRivet(15, y);      // Links
                addRivet(w - 45, y);  // Rechts
            }
        }

        function addRivet(x, y) {
            const r = document.createElement('div');
            r.className = 'niete';
            r.style.left = x + 'px';
            r.style.top = y + 'px';
            canvas.appendChild(r);
        }

        placeRivets();
    </script>
</body>
</html>
