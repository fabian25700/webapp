<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reisekoffer | Fabian Geisbüsch</title>
    <style>
        :root {
            --accent: #e67e22;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --alu-base: #bdc3c7;
            --alu-dark: #7f8c8d;
            --alu-bright: #ecf0f1;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #2d3f55;
                --border-light: #253347;
                --shadow: 0 4px 20px rgba(0,0,0,0.3);
                --alu-base: #7f8c8d;
                --alu-dark: #2c3e50;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg);
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-light);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--surface); border: 1px solid var(--border);
            text-decoration: none; color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        header h1 { font-size: 1.15rem; font-weight: 800; }

        .viewport { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .suitcase-container { position: relative; display: flex; flex-direction: column; align-items: center; }

        @media (max-width: 600px) {
            .suitcase-container { transform: rotate(-90deg) scale(0.6); }
        }

        /* Teleskopgriff Upgrade */
        .telescope-system {
            width: 160px; height: 50px;
            position: relative; margin-bottom: -5px;
            z-index: 1;
        }
        .rail {
            position: absolute; width: 14px; height: 100%;
            background: linear-gradient(to right, #222, #444, #222);
            border-radius: 4px 4px 0 0;
        }
        .rail.left { left: 20px; }
        .rail.right { right: 20px; }
        .handle-bar {
            position: absolute; top: 0; left: 10px; right: 10px; height: 18px;
            background: linear-gradient(to bottom, #333, #111, #000);
            border-radius: 8px;
            border: 1px solid #444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Koffer Korpus */
        .suitcase-body {
            width: 820px; height: 520px;
            background: var(--alu-base);
            border: 14px solid var(--alu-dark);
            border-radius: 54px;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            background-image: repeating-linear-gradient(90deg, transparent 0, transparent 40px, rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 42px);
        }

        /* Seitengriff Upgrade */
        .handle-side {
            position: absolute; right: -28px; top: 50%;
            transform: translateY(-50%);
            width: 38px; height: 180px;
            background: linear-gradient(to right, #111, #333, #111);
            border-radius: 0 14px 14px 0;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #000;
        }
        .handle-side::after {
            content: "RIMOWA KÖLN";
            color: rgba(255,255,255,0.2);
            font-size: 10px; font-weight: 900; letter-spacing: 3px;
            transform: rotate(90deg); white-space: nowrap;
        }

        /* Rollen */
        .wheel-bracket { position: absolute; left: -42px; top: 90px; bottom: 90px; display: flex; flex-direction: column; justify-content: space-between; }
        .wheel {
            width: 48px; height: 85px; background: #111;
            border-radius: 18px 0 0 18px; border-left: 15px solid #000;
            box-shadow: -4px 0 10px rgba(0,0,0,0.2);
        }

        /* Nieten */
        .niete {
            position: absolute; width: 8px; height: 8px;
            background: radial-gradient(circle at 3px 3px, #bdc3c7, #7f8c8d);
            border-radius: 50%;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            z-index: 5;
        }

    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Reisekoffer</h1>
    </header>

    <div class="viewport">
        <div class="suitcase-container">
            <div class="telescope-system">
                <div class="rail left"></div>
                <div class="rail right"></div>
                <div class="handle-bar"></div>
            </div>

            <div class="suitcase-body" id="canvas">
                <div class="wheel-bracket">
                    <div class="wheel"></div>
                    <div class="wheel"></div>
                </div>
                <div class="handle-side"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        
        function placeRivets() {
            const w = 820;
            const h = 520;
            const step = 60; // Abstand zwischen Nieten

            // Horizontale Reihen
            for(let x = 60; x < w - 60; x += step) {
                addRivet(x, 15);      // Oben
                addRivet(x, h - 45);  // Unten
            }
            // Vertikale Reihen
            for(let y = 60; y < h - 60; y += step) {
                addRivet(15, y);      // Links
                addRivet(w - 45, y);  // Rechts
            }
        }

        function addRivet(x, y) {
            const r = document.createElement('div');
            r.className = 'niete';
            r.style.left = x + 'px';
            r.style.top = y + 'px';
            canvas.appendChild(r);
        }

        placeRivets();
    </script>
</body>
</html>
