<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reisekoffer | Life-Log</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --header-border: #e2e8f0;
            --alu-base: #bdc3c7;
            --alu-dark: #9da4a7;
            --alu-bright: #e1e4e6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --header-bg: rgba(15, 23, 42, 0.9);
                --header-text: #f1f5f9;
                --header-border: #1e293b;
                --alu-base: #7f8c8d;
                --alu-dark: #2c3e50;
                --alu-bright: #bdc3c7;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            background: var(--bg-color);
            font-family: -apple-system, sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 2000;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            background: var(--header-bg); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }
        header h1 { color: var(--header-text); font-size: 1.15rem; font-weight: 800; }

        .back-btn {
            width: 36px; height: 36px; background: white; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border: 1px solid #ddd; text-decoration: none; color: black;
        }

        .viewport {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 20px; margin-top: 100px;
        }

        .suitcase-container {
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            width: 820px; height: 520px;
        }

        @media (max-width: 600px) {
            .suitcase-container { transform: rotate(-90deg) scale(0.65); margin-top: 130px; }
        }

        .suitcase-body {
            width: 100%; height: 100%;
            background: var(--alu-base);
            border-radius: 54px; border: 14px solid var(--alu-dark);
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.25);
            overflow: hidden;
            background-image: 
                repeating-linear-gradient(90deg, 
                    rgba(255,255,255,0.08) 0, rgba(255,255,255,0.08) 38px, 
                    rgba(0,0,0,0.08) 38px, rgba(0,0,0,0.08) 42px
                ),
                radial-gradient(circle at 50% 50%, var(--alu-bright), var(--alu-base));
        }

        /* Griff oben an der langen Seite */
        .handle-top-system {
            position: absolute; top: -28px; left: 50%;
            transform: translateX(-50%); display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }
        .handle-mount {
            width: 140px; height: 12px; background: #222;
            border-radius: 6px 6px 0 0; border: 1px solid #000;
        }
        .handle-side {
            width: 180px; height: 40px;
            background: linear-gradient(to bottom, #111, #333, #111);
            border-radius: 14px; border: 2px solid #000;
            display: flex; align-items: center; justify-content: center;
            margin-top: -5px; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        
        .handle-side::after {
            content: "RIMOWA"; 
            font-size: 12px; font-weight: 900; letter-spacing: 4px;
            white-space: nowrap;
            background: linear-gradient(135deg, #fff 0%, #eee 40%, #ccc 50%, #eee 60%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.5));
        }

        .niete {
            position: absolute; width: 8px; height: 8px;
            background: radial-gradient(circle at 3px 3px, var(--alu-bright), #7f8c8d);
            border-radius: 50%; box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            z-index: 5;
        }
    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Life-Log Suitcase</h1>
    </header>

    <div class="viewport">
        <div class="suitcase-container" id="suitcase-canvas">
            
            <div class="handle-top-system">
                <div class="handle-mount"></div>
                <div class="handle-side"></div>
            </div>

            <div class="suitcase-body">
                </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('suitcase-canvas');
        const rivetsCountHor = 12;
        const rivetsCountVer = 8;

        function createRivets() {
            for(let i = 0; i < rivetsCountHor; i++) {
                addRivet(60 + (i * 65), 25);      // Oben
                addRivet(60 + (i * 65), 485);     // Unten
            }
            for(let i = 0; i < rivetsCountVer; i++) {
                addRivet(25, 60 + (i * 60));      // Links
                addRivet(785, 60 + (i * 60));     // Rechts
            }
        }

        function addRivet(x, y) {
            const r = document.createElement('div');
            r.className = 'niete';
            r.style.left = x + 'px';
            r.style.top = y + 'px';
            canvas.appendChild(r);
        }

        createRivets();
    </script>
</body>
</html>
