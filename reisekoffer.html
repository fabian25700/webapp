<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Life-Log | Fabian Geisbüsch</title>
    <style>
        /* Konsistente Variablen aus deinem Tech-Stack */
        :root {
            --bg-color: #f0f2f5;
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --header-border: #e2e8f0;
            --card-bg: #ffffff;
            --text-secondary: #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --header-bg: rgba(15, 23, 42, 0.9);
                --header-text: #f1f5f9;
                --header-border: #1e293b;
                --card-bg: #1e293b;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header Style Konsistenz */
        header {
            position: fixed; top: 0; width: 100%; z-index: 2000;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            background: var(--header-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }
        header h1 { color: var(--header-text); font-size: 1.15rem; font-weight: 800; }

        /* Die Koffer-Szene */
        .suitcase-scene {
            margin-top: 100px; /* Platz für Header */
            flex: 1; display: flex; justify-content: center; align-items: center; perspective: 1000px;
        }

        /* Container für das Bild und die zukünftigen Sticker */
        .suitcase-container {
            position: relative;
            /* Seitenverhältnis des Originalbildes beibehalten */
            width: 80vh; /* Skaliert mit der Bildschirmhöhe */
            max-width: 600px; /* Begrenzung auf großen Screens */
            aspect-ratio: 1 / 1.4; /* Hochformat-Koffer */
            
            /* Das Originalbild als perfekter fotorealistischer Hintergrund */
            background-image: url('image_0.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            
            /* Subtiler Schatten für Tiefenwirkung auf der Seite */
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.3));
        }

        /* Zentrales Dossier (optisch angepasst an deine Länder-Toggles) */
        #central-info {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; background: var(--card-bg); border-radius: 20px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            z-index: 1500; opacity: 0; pointer-events: none; transition: 0.3s;
            border: 1px solid var(--header-border);
            text-align: center;
        }
        #central-info.active { opacity: 1; pointer-events: auto; }

        .info-header { border-bottom: 1px solid var(--header-border); padding-bottom: 12px; margin-bottom: 15px; }
        .info-header h3 { font-size: 1.2rem; font-weight: 800; color: var(--header-text); }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); }
        .info-row strong { color: var(--header-text); }
        .info-desc { font-size: 12px; margin-top: 15px; line-height: 1.5; color: var(--text-secondary); font-style: italic; }

    </style>
</head>
<body>

    <header>
        <div style="width: 36px; height: 36px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold;">←</div>
        <h1>Reisekoffer</h1>
    </header>

    <div class="suitcase-scene">
        <div class="suitcase-container" id="canvas">
            
            <div id="central-info">
                <div class="info-header"><h3 id="info-city">-</h3></div>
                <div class="info-row"><span>Land:</span> <strong id="info-country">-</strong></div>
                <div class="info-row"><span>Aufenthalt:</span> <strong id="info-nights">-</strong></div>
                <div class="info-row"><span>Fußball:</span> <span id="info-fb">⚪</span></div>
                <p class="info-desc" id="info-desc">-</p>
            </div>
        </div>
    </div>

    <script>

        const canvas = document.getElementById('canvas');
        const infoBox = document.getElementById('central-info');

    </script>
</body>
</html>
