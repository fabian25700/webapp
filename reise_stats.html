<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reisen</title>
    <script src="daten.js"></script>
    <style>
        :root {
            --accent: #e67e22;
            --accent-soft: rgba(230, 126, 34, 0.1);
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --surface-2: #162032;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --text-tertiary: #64748b;
                --border: #2d3f55;
                --border-light: #253347;
                --shadow: 0 2px 8px rgba(0,0,0,0.3);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: calc(env(safe-area-inset-bottom) + 32px);
            transition: background 0.3s;
        }

        /* ── Header ── */
        header {
            position: sticky; top: 0; z-index: 50;
            background: var(--bg);
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-light);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--surface); border: 1px solid var(--border);
            text-decoration: none; color: var(--text-primary);
            box-shadow: var(--shadow); transition: all 0.15s;
        }
        .back-btn:active { transform: scale(0.92); opacity: 0.7; }

        header h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.01em; }

        /* ── Inhalt ── */
        main { padding: 20px 16px 0; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        .section-label {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.07em; color: var(--text-tertiary); padding: 0 4px;
        }

        /* ── Stats-Grid ── */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stats-grid.three { grid-template-columns: 1fr 1fr 1fr; }

        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 18px; padding: 16px 14px; text-align: center; box-shadow: var(--shadow);
        }

        .stat-val { display: block; font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 0.62rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; margin-top: 4px; }

        /* ── Nav-Karten & Stempel ── */
        .nav-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 18px; box-shadow: var(--shadow);
            text-decoration: none; display: flex; align-items: center;
            gap: 14px; padding: 16px 18px; position: relative; overflow: hidden;
            transition: transform 0.12s ease; -webkit-tap-highlight-color: transparent;
        }

        .nav-card:active { transform: scale(0.97); background: var(--surface-2); }

        .nav-icon {
            font-size: 1.25rem; width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            background: var(--accent-soft); border-radius: 12px;
        }

        .nav-text { flex: 1; }
        .nav-title { font-weight: 700; font-size: 1rem; color: var(--text-primary); }
        .nav-sub { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
        .nav-arrow { color: var(--text-tertiary); font-size: 1rem; }

        /* Stempel Animation */
        .stamp-effect {
            position: absolute; width: 100px; height: 100px;
            border: 4px solid var(--accent); border-radius: 50%;
            color: var(--accent); font-weight: 900; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; opacity: 0; pointer-events: none;
            left: 50%; top: 50%; margin-left: -50px; margin-top: -50px;
        }

        .animate-stamp {
            animation: stamp-drop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes stamp-drop {
            0% { transform: scale(4) rotate(-25deg); opacity: 0; }
            50% { transform: scale(1) rotate(-15deg); opacity: 0.8; }
            100% { transform: scale(1.1) rotate(-15deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">←</a>
        <h1>Reisen</h1>
    </header>

    <main>
        <div class="section-label">Überblick</div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val" id="val-laender">–</span>
                <span class="stat-label">Länder</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-naechte">–</span>
                <span class="stat-label">Nächte</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-km">–</span>
                <span class="stat-label">km gejoggt</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-fluege">–</span>
                <span class="stat-label">Flüge</span>
            </div>
        </div>

        <div class="stats-grid three">
            <div class="stat-card">
                <span class="stat-val" id="val-unterkuenfte">–</span>
                <span class="stat-label">Unterkünfte</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-laeufe">–</span>
                <span class="stat-label">Läufe</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-avg-km">–</span>
                <span class="stat-label">ø km</span>
            </div>
        </div>

        <div class="section-label" style="margin-top:8px;">Erkunden</div>

        <a href="weltkarte.html" class="nav-card">
            <div class="nav-icon">🗺️</div>
            <div class="nav-text">
                <div class="nav-title">Weltkarte</div>
                <div class="nav-sub">Visualisierung deiner Reisen</div>
            </div>
            <div class="nav-arrow">→</div>
        </a>

        <a href="bucketlist.html" class="nav-card" onclick="playStampEffect(event, this)">
            <div class="nav-icon">🎯</div>
            <div class="nav-text">
                <div class="nav-title">Bucketlist</div>
                <div class="nav-sub">Ziele & Träume</div>
            </div>
            <div class="nav-arrow">→</div>
            <div class="stamp-effect" id="stamp">Approved</div>
        </a>

        <a href="laender.html" class="nav-card">
            <div class="nav-icon">📋</div>
            <div class="nav-text">
                <div class="nav-title">Länderliste</div>
                <div class="nav-sub">Alle Details im Überblick</div>
            </div>
            <div class="nav-arrow">→</div>
        </a>
    </main>

    <script>
        window.onload = function () {
            let naechte = 0, km = 0, fluege = 0, unterkuenfte = 0, laeufe = 0;
            MEINE_REISEN.forEach(t => {
                naechte += t.Übernachtungen;
                km += t.km_gejoggt;
                fluege += t.FluegeAnkunft;
                unterkuenfte += t.Unterkünfte;
                laeufe += t.Joggen;
            });
            document.getElementById('val-laender').textContent = MEINE_REISEN.length;
            document.getElementById('val-naechte').textContent = naechte;
            document.getElementById('val-km').textContent = km.toLocaleString('de-DE');
            document.getElementById('val-fluege').textContent = fluege;
            document.getElementById('val-unterkuenfte').textContent = unterkuenfte;
            document.getElementById('val-laeufe').textContent = laeufe;
            document.getElementById('val-avg-km').textContent = laeufe > 0 ? (km/laeufe).toFixed(1) : '–';
        };

        function playStampEffect(event, element) {
            event.preventDefault();
            const targetUrl = element.getAttribute('href');
            const stamp = element.querySelector('#stamp');
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            stamp.classList.add('animate-stamp');
            setTimeout(() => { window.location.href = targetUrl; }, 400);
        }
    </script>
</body>
</html>
