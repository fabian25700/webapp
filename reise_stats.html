<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reisen</title>
    <script src="daten.js"></script>
    <style>
        :root {
            --accent: #e67e22;
            --accent-soft: rgba(230, 126, 34, 0.1);
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --surface-2: #162032;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --text-tertiary: #64748b;
                --border: #2d3f55;
                --border-light: #253347;
                --shadow: 0 2px 8px rgba(0,0,0,0.3);
                --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: calc(env(safe-area-inset-bottom) + 32px);
            transition: background 0.3s, color 0.3s;
        }

        /* ── Header ── */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg);
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background 0.3s;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            text-decoration: none;
            font-size: 1rem;
            color: var(--text-primary);
            box-shadow: var(--shadow);
            flex-shrink: 0;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .back-btn:active { transform: scale(0.92); opacity: 0.7; }

        header h1 {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        /* ── Inhalt ── */
        main {
            padding: 20px 16px 0;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── Sektion-Label ── */
        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-tertiary);
            padding: 0 4px;
            margin-top: 4px;
        }

        /* ── Stats-Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stats-grid.three {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 14px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-val {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1.1;
        }

        .stat-label {
            display: block;
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 4px;
        }

        /* ── Nav-Karten ── */
        .nav-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            transition: transform 0.12s ease, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-card:active {
            transform: scale(0.97);
            background: var(--surface-2);
        }

        .nav-icon {
            font-size: 1.25rem;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-soft);
            border-radius: 12px;
            flex-shrink: 0;
        }

        .nav-text { flex: 1; }

        .nav-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .nav-sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .nav-arrow {
            color: var(--text-tertiary);
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">←</a>
        <h1>Reisen</h1>
    </header>

    <main>
        <div class="section-label">Überblick</div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val" id="val-laender">–</span>
                <span class="stat-label">Länder</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-naechte">–</span>
                <span class="stat-label">Nächte gesamt</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-km">–</span>
                <span class="stat-label">km gejoggt</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-fluege">–</span>
                <span class="stat-label">Flüge</span>
            </div>
        </div>

        <div class="stats-grid three">
            <div class="stat-card">
                <span class="stat-val" id="val-unterkuenfte">–</span>
                <span class="stat-label">Unterkünfte</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-laeufe">–</span>
                <span class="stat-label">Jogging-Läufe</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="val-avg-km">–</span>
                <span class="stat-label">ø km / Lauf</span>
            </div>
        </div>

        <div class="section-label" style="margin-top:4px;">Erkunden</div>

        <a href="weltkarte.html" class="nav-card">
            <div class="nav-icon">🗺️</div>
            <div class="nav-text">
                <div class="nav-title">Weltkarte</div>
                <div class="nav-sub">Besuchte Länder auf der Karte</div>
            </div>
            <div class="nav-arrow">→</div>
        </a>

        <a href="laender.html" class="nav-card">
            <div class="nav-icon">📋</div>
            <div class="nav-text">
                <div class="nav-title">Alle Länder</div>
                <div class="nav-sub">Details, Flaggen & Statistiken</div>
            </div>
            <div class="nav-arrow">→</div>
        </a>
    </main>

    <script>
        window.onload = function () {
            let naechte = 0, km = 0, fluege = 0, unterkuenfte = 0, laeufe = 0;

            MEINE_REISEN.forEach(function (t) {
                naechte      += t.Übernachtungen;
                km           += t.km_gejoggt;
                fluege       += t.FluegeAnkunft;
                unterkuenfte += t.Unterkünfte;
                laeufe       += t.Joggen;
            });

            var avgKm = laeufe > 0 ? (km / laeufe).toFixed(1) : '–';

            document.getElementById('val-laender').textContent      = MEINE_REISEN.length;
            document.getElementById('val-naechte').textContent      = naechte;
            document.getElementById('val-km').textContent           = km.toLocaleString('de-DE');
            document.getElementById('val-fluege').textContent       = fluege;
            document.getElementById('val-unterkuenfte').textContent = unterkuenfte;
            document.getElementById('val-laeufe').textContent       = laeufe;
            document.getElementById('val-avg-km').textContent       = avgKm;
        };
    </script>
</body>
</html>
