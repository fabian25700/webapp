<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; max-width: 600px; }
        .menu-card { background: white; padding: 40px 20px; border-radius: 25px; text-align: center; text-decoration: none; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .menu-card:active { transform: scale(0.95); }
        .icon { font-size: 3rem; display: block; margin-bottom: 10px; }
        .title { font-weight: bold; color: #1e293b; font-size: 1.2rem; }
        .travel { border-bottom: 5px solid #2ecc71; }
        .daily { border-bottom: 5px solid #3498db; }
    </style>
</head>
<body>
    <div class="menu-container">
        <a href="reise_stats.html" class="menu-card travel">
            <span class="icon">🌍</span>
            <span class="title">Reisen</span>
        </a>
        <a href="alltag.html" class="menu-card daily">
            <span class="icon">🏠</span>
            <span class="title">Alltag</span>
        </a>
    </div>
</body>
</html>
