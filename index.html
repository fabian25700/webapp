<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fabians App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/emoji/512/fox-emoji.png">
    
    <style>
        :root {
            --fox-orange: #e67e22;
            --bg: #fdfdfd;
            --text: #2c3e50;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Eleganter Header */
        .header {
            width: 100%;
            padding: 60px 20px 30px;
            text-align: center;
            background: white;
        }

        .fox-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 10px rgba(230, 126, 34, 0.2));
        }

        h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Statistik-Bereich */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            text-align: center;
            padding: 10px;
        }

        .stat-val {
            display: block;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--fox-orange);
        }

        .stat-lab {
            font-size: 0.65rem;
            color: #95a5a6;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Buttons */
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-item {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #f1f1f1;
            transition: all 0.2s ease;
        }

        .nav-item:active {
            transform: scale(0.97);
            background: #fafafa;
        }

        .nav-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-icon {
            font-size: 1.3rem;
            width: 30px;
            text-align: center;
        }

        .nav-text {
            font-weight: 600;
            font-size: 1rem;
        }

        .arrow {
            color: #dcdde1;
            font-weight: bold;
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #bdc3c7;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://img.icons8.com/emoji/512/fox-emoji.png" alt="Fuchs" class="fox-logo">
        <h1>Fabians App</h1>
    </div>

    <div class="container">
        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-val">28</span>
                <span class="stat-lab">Länder</span>
            </div>
            <div class="stat-box">
                <span class="stat-val">14%</span>
                <span class="stat-lab">Welt</span>
            </div>
            <div class="stat-box">
                <span class="stat-val">3</span>
                <span class="stat-lab">Kontinente</span>
            </div>
        </div>

        <div class="nav-list">
            <a href="laender.html" class="nav-item">
                <div class="nav-content">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Besuchte Länder</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="weltkarte.html" class="nav-item">
                <div class="nav-content">
                    <span class="nav-icon">🗺️</span>
                    <span class="nav-text">Interaktive Karte</span>
                </div>
                <span class="arrow">→</span>
            </a>
            
            <div class="nav-item" style="opacity: 0.5;">
                <div class="nav-content">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Einstellungen</span>
                </div>
                <span style="font-size: 0.7rem; color: #95a5a6;">BALD</span>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Fabians App
    </footer>

</body>
</html>
