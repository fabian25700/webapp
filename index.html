<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabians WebApp</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            letter-spacing: -0.025em;
            color: var(--text);
        }

        .menu-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nav-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 20px 24px;
            border-radius: 18px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Effekt beim Tippen am Handy */
        .nav-button:active {
            transform: scale(0.97);
            background-color: #f1f5f9;
        }

        .icon-circle {
            width: 40px;
            height: 40px;
            background: #eff6ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .arrow {
            color: #cbd5e1;
            font-size: 1.2rem;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fabians WebApp</h1>

        <div class="menu-stack">
            <a href="laender.html" class="nav-button">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="icon-circle">🗺️</div>
                    <span>Besuchte Länder</span>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="#" class="nav-button">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="icon-circle">📊</div>
                    <span>Statistiken</span>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="#" class="nav-button">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="icon-circle">👤</div>
                    <span>Mein Profil</span>
                </div>
                <div class="arrow">→</div>
            </a>
        </div>

        <footer>
            Version 1.0 • Build 2026
        </footer>
    </div>

</body>
</html>
