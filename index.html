<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; max-width: 600px; }
        
        .menu-card { 
            background: white; padding: 40px 20px; border-radius: 25px; 
            text-align: center; text-decoration: none; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; align-items: center;
        }

        /* Jello Animation Definition */
        @keyframes jello-horizontal {
            0% { transform: scale3d(1, 1, 1); }
            30% { transform: scale3d(1.25, 0.75, 1); }
            40% { transform: scale3d(0.75, 1.25, 1); }
            50% { transform: scale3d(1.15, 0.85, 1); }
            65% { transform: scale3d(0.95, 1.05, 1); }
            75% { transform: scale3d(1.05, 0.95, 1); }
            100% { transform: scale3d(1, 1, 1); }
        }

        /* Animation triggern bei Hover (Desktop) oder Klick/Touch */
        .menu-card:hover, .menu-card:active {
            animation: jello-horizontal 0.9s both;
            z-index: 10;
        }

        .icon { font-size: 3rem; margin-bottom: 10px; pointer-events: none; }
        .title { font-weight: bold; color: #1e293b; font-size: 1.2rem; pointer-events: none; }
        
        .travel { border-bottom: 5px solid #2ecc71; }
        .daily { border-bottom: 5px solid #3498db; }
    </style>
</head>
<body>
    <div class="menu-container">
        <a href="reise_stats.html" class="menu-card travel">
            <span class="icon">🌍</span>
            <span class="title">Reisen</span>
        </a>
        <a href="alltag.html" class="menu-card daily">
            <span class="icon">🏠</span>
            <span class="title">Alltag</span>
        </a>
    </div>
</body>
</html>
