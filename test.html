<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fabians App</title>
    <script src="daten.js"></script>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --secondary: #3498db;
            --bg: #f0f2f5;
            --surface: rgba(255, 255, 255, 0.95);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: rgba(203, 213, 225, 0.8);
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            --card-hover: rgba(240, 240, 240, 0.95);
            --snake-btn-bg: white;
            --snake-btn-border: #cbd5e1;
            --snake-btn-color: #64748b;
            --arrow-color: #cbd5e1;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: rgba(30, 41, 59, 0.95);
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: rgba(51, 65, 85, 0.8);
                --shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
                --card-hover: rgba(51, 65, 85, 0.95);
                --snake-btn-bg: #1e293b;
                --snake-btn-border: #334155;
                --snake-btn-color: #94a3b8;
                --arrow-color: #475569;
            }
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            background: var(--bg);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.3s ease;
        }

        header {
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header-title {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.04em;
            color: var(--text-primary);
        }

        /* Gruppierung der Header-Buttons */
        .header-actions {
            display: flex;
            gap: 8px;
        }

        #snake-start, .header-btn {
            background: var(--snake-btn-bg);
            border: 1.5px solid var(--snake-btn-border);
            color: var(--snake-btn-color);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            z-index: 110;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        #snake-start:active, .header-btn:active { transform: scale(0.94); opacity: 0.8; }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 13px;
            width: 85%;
            max-width: 360px;
            margin: auto;
            z-index: 10;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .menu-card {
            background: var(--surface);
            padding: 18px 22px;
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.12s ease, background 0.2s ease;
            border: 1px solid var(--border);
        }

        .menu-card:active { transform: scale(0.96); background: var(--card-hover); }

        .icon { font-size: 1.35rem; line-height: 1; }
        .title { font-weight: 600; color: var(--text-primary); font-size: 1.05rem; flex-grow: 1; }
        .arrow { color: var(--arrow-color); font-size: 1rem; }

        #game-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: none;
        }

        #score-display {
            position: fixed;
            top: 80px;
            width: 100%;
            text-align: center;
            font-weight: 900;
            color: var(--primary);
            display: none;
            z-index: 100;
            font-size: 2.2rem;
            opacity: 0.5;
            pointer-events: none;
        }

        #instructions {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: none;
        }

        #instructions.visible { display: flex; }

        .instr-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 26px 32px;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            animation: fadeInScale 0.35s ease;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.88); }
            to   { opacity: 1; transform: scale(1); }
        }

        .instr-box h2 { margin: 0 0 10px 0; font-size: 1.2rem; font-weight: 800; color: var(--text-primary); }
        .instr-box p { margin: 0 0 6px 0; font-size: 0.88rem; color: var(--text-secondary); line-height: 1.5; }
        .instr-key { display: inline-block; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 3px 8px; font-size: 0.78rem; font-weight: 700; color: var(--text-primary); margin: 2px; }
        .instr-touch { font-size: 1.6rem; margin: 6px 0; }
    </style>
</head>

    <header>
