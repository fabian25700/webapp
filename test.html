<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Demo | New York</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            /* NYC Sticker Farben */
            --nyc-blue: #002868;
            --nyc-red: #bf0a30;
            --nyc-white: #ffffff;
            --step-grey: #555;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* DIE-CUT STICKER EFFECT 
           Das drop-shadow erzeugt den weißen Schnittrand, der 
           der komplexen SVG-Form des "Anbisses" folgt.
        */
        .sticker-container {
            position: relative;
            /* WICHTIG: Die Größe des Drop-Shadows bestimmt den Schnittrand */
            filter: drop-shadow(0 4px 0px var(--nyc-white)) 
                    drop-shadow(0 6px 12px rgba(0,0,0,0.5));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .sticker-container:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .nyc-apple-sticker {
            width: 250px;
            height: 250px;
            background-color: var(--nyc-red);
            /* Form: Ein Apfel mit einem Anbiss oben rechts */
            clip-path: polygon(50% 0%, 75% 5%, 85% 15%, 83% 25%, 95% 35%, 100% 50%, 95% 75%, 85% 90%, 50% 100%, 15% 90%, 5% 75%, 0% 50%, 5% 35%, 15% 15%, 25% 5%);
            
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 10px;
            border: 2px solid rgba(0,0,0,0.2);

            /* VINYL/PAPIER TEXTUR & GLANZ
               Radial gradient simuliert eine leichte Wölbung, 
               linear gradient den Lichtreflex.
            */
            background-image: 
                linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%, rgba(0,0,0,0.1) 100%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.05) 100%);
        }

        /* Apfelstiel & Blatt */
        .apple-stem {
            position: absolute;
            top: 5px; left: 50%;
            transform: translateX(-50%);
            width: 15px; height: 35px;
            background: #6f4e37;
            border-radius: 5px 5px 0 0;
            z-index: 1;
        }
        .apple-leaf {
            position: absolute;
            top: -5px; left: 55%;
            width: 30px; height: 20px;
            background: #228b22;
            border-radius: 50% 0 50% 0;
            transform: rotate(20deg);
            z-index: 2;
            border: 1px solid rgba(0,0,0,0.3);
        }

        /* STADT-DESIGN (Skyline)
           Wir nutzen CSS-Patterns, um die Freiheitsstatue 
           und Wolkenkratzer zu simulieren.
        */
        .nyc-design {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60%;
            background-color: var(--nyc-blue);
            clip-path: polygon(0% 100%, 0% 30%, 15% 35%, 20% 10%, 25% 35%, 35% 30%, 45% 45%, 50% 0%, 55% 45%, 65% 40%, 75% 50%, 80% 20%, 85% 50%, 100% 45%, 100% 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
        }

        /* Sterne-Pattern für USA-Bezug */
        .nyc-design::after {
            content: "";
            position: absolute;
            top: 10px; right: 10px;
            width: 40px; height: 40px;
            background-image: radial-gradient(white 10%, transparent 11%);
            background-size: 10px 10px;
            opacity: 0.3;
        }

        /* TYPOGRAFIE */
        .sticker-text-top {
            color: var(--nyc-white);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .sticker-text-main {
            color: var(--nyc-white);
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            font-family: "Arial Black", Gadget, sans-serif; /* Blockig */
            text-shadow: 2px 2px 0 var(--nyc-blue), 4px 4px 0 rgba(0,0,0,0.3);
            z-index: 10;
            margin-top: -10px;
        }

        .sticker-year {
            background-color: var(--nyc-white);
            color: var(--nyc-blue);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 800;
            margin-top: 5px;
            z-index: 10;
        }

    </style>
</head>
<body>

    <div class="sticker-container">
        
        <div class="nyc-apple-sticker">
            <div class="apple-stem"></div>
            <div class="apple-leaf"></div>

            <div class="sticker-text-top">The Big Apple</div>
            <div class="sticker-text-main">NYC</div>
            <div class="sticker-year">JAN 2024</div>

            <div class="nyc-design">
                </div>
        </div>

    </div>

</body>
</html>
