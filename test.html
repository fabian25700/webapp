<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Departures</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --header-border: #e2e8f0;
            --btn-bg: #ffffff;
            --btn-border: #e2e8f0;
            --btn-text: #1e293b;
            --board-bg: #1a1a1a;
            --flap-bg: #222;
            --text-white: #ffffff;
            --text-yellow: #fdb813;
            
            /* Standard Laptop Maße */
            --flap-w: 20px;
            --flap-h: 30px;
            --flap-font: 18px;
            --board-scale: 1;
            --rotation: 0deg;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --header-bg: rgba(15, 23, 42, 0.9);
                --header-text: #f1f5f9;
                --header-border: #1e293b;
                --btn-bg: #1e293b;
                --btn-border: #2d3f55;
                --btn-text: #f1f5f9;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            background: var(--header-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            text-decoration: none; color: var(--btn-text);
        }

        header h1 { color: var(--header-text); font-size: 1.15rem; font-weight: 800; }

        .content-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin-top: 40px;
        }

        #departure-board {
            background-color: var(--board-bg);
            padding: 20px;
            border: 6px solid #333;
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: max-content;
            transform: rotate(var(--rotation)) scale(var(--board-scale));
            transition: all 0.3s ease;
        }

        /* Mobile Optimierung: Erzwungene Anpassung */
        @media screen and (max-width: 768px) {
            :root {
                /* Nutzt Viewport-Einheiten: Das Board wird IMMER so breit wie das Display hoch ist */
                --flap-w: 1.6vh; 
                --flap-h: 2.5vh;
                --flap-font: 1.4vh;
                --rotation: -90deg;
                --board-scale: 1;
            }
            
            #departure-board {
                position: fixed;
                left: 50%;
                top: 55%;
                transform: translate(-50%, -50%) rotate(-90deg);
                padding: 10px;
                border-width: 4px;
            }

            .board-title { font-size: 3vh !important; margin-bottom: 10px !important; }
            .board-header { font-size: 1.2vh !important; gap: 4px !important; }
            .flight-row { gap: 4px !important; margin-bottom: 4px !important; }
            .flap-group { gap: 1px !important; }
        }

        .board-title {
            color: var(--text-yellow);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .board-header {
            display: grid;
            gap: 10px;
            margin-bottom: 8px;
            color: #555;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .flight-row {
            display: grid;
            gap: 10px;
            margin-bottom: 8px;
        }

        .flap-group { display: flex; gap: 2px; }

        .flap {
            width: var(--flap-w);
            height: var(--flap-h);
            background-color: var(--flap-bg);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: var(--flap-font);
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            border: 1px solid #000;
        }

        .flight-row div:nth-child(4) .flap { color: var(--text-yellow); }

        .flap::after {
            content: ''; position: absolute; top: 50%; left: 0;
            width: 100%; height: 1px; background: rgba(0,0,0,0.6);
            z-index: 2;
        }

        @keyframes flip {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-360deg); }
        }
        .flipping { animation: flip 0.1s ease-in-out infinite; }
    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Departures</h1>
    </header>

    <div class="content-container">
        <div id="departure-board">
            <div class="board-title">DEPARTURES ✈</div>
            <div id="board-header-row" class="board-header"></div>
            <div id="rows-container"></div>
        </div>
    </div>

<script>
    const CHARS = " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789:.";
    
    const travelData = [
        { date: "15.04.26", flight: "EK046", from: "DUESSELDORF", to: "DUBAI", airline: "EMIRATES" },
        { date: "10.06.26", flight: "SK638", from: "DUESSELDORF", to: "STOCKHOLM", airline: "SAS" },
        { date: "05.07.26", flight: "UA122", from: "FRANKFURT", to: "NEW YORK", airline: "UNITED" },
        { date: "12.08.26", flight: "MK011", from: "PARIS", to: "MAURITIUS", airline: "AIR MAURITIUS" },
        { date: "20.09.26", flight: "LH184", from: "KOELN", to: "COPENHAGEN", airline: "LUFTHANSA" }
    ];

    const keys = ["date", "flight", "from", "to", "airline"];
    const labels = ["Datum", "Flug", "Abflug", "Ankunft", "Airline"];
    
    const colLengths = keys.map((key, i) => {
        const maxDataLen = Math.max(...travelData.map(d => d[key].length));
        return Math.max(maxDataLen, labels[i].length);
    });

    function initBoard() {
        const headerRow = document.getElementById('board-header-row');
        const rowsContainer = document.getElementById('rows-container');
        
        // Berechnung der Grid-Spalten basierend auf den Buchstaben-Längen
        const gridTemplate = colLengths.map(l => `calc(${l} * (var(--flap-w) + 2px))`).join(" ");
        
        headerRow.style.gridTemplateColumns = gridTemplate;
        
        labels.forEach(label => {
            const div = document.createElement('div');
            div.textContent = label;
            headerRow.appendChild(div);
        });

        travelData.forEach(() => {
            const row = document.createElement('div');
            row.className = 'flight-row';
            row.style.gridTemplateColumns = gridTemplate;
            colLengths.forEach(len => row.appendChild(createFlapGroup(len)));
            rowsContainer.appendChild(row);
        });
    }

    function createFlapGroup(length) {
        const group = document.createElement('div');
        group.className = 'flap-group';
        for (let i = 0; i < length; i++) {
            const flap = document.createElement('div');
            flap.className = 'flap';
            flap.textContent = ' ';
            group.appendChild(flap);
        }
        return group;
    }

    async function animateFlap(flap, targetChar) {
        let currentIndex = 0;
        flap.classList.add('flipping');
        return new Promise(resolve => {
            const interval = setInterval(() => {
                const char = CHARS[currentIndex];
                flap.textContent = char;
                if (char === targetChar) {
                    clearInterval(interval);
                    flap.classList.remove('flipping');
                    resolve();
                }
                currentIndex = (currentIndex + 1) % CHARS.length;
            }, 30);
        });
    }

    async function updateRow(rowIndex, data) {
        const row = document.getElementsByClassName('flight-row')[rowIndex];
        const groups = row.getElementsByClassName('flap-group');

        for (let g = 0; g < groups.length; g++) {
            const flaps = groups[g].getElementsByClassName('flap');
            const targetStr = data[keys[g]].toUpperCase().padEnd(colLengths[g]);
            for (let f = 0; f < flaps.length; f++) {
                animateFlap(flaps[f], targetStr[f]);
                await new Promise(r => setTimeout(r, 20));
            }
        }
    }

    initBoard();
    setTimeout(() => {
        travelData.forEach((data, index) => {
            setTimeout(() => updateRow(index, data), index * 400);
        });
    }, 800);
</script>

</body>
</html>
