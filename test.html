<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reisekoffer | Fabian Geisbüsch</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --header-border: #e2e8f0;
            --alu: #bdc3c7;
            --alu-dark: #9da4a7;
            --alu-bright: #e1e4e6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            background: var(--bg-color);
            font-family: -apple-system, sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 2000;
            padding: 20px; background: var(--header-bg); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }
        header h1 { font-size: 1.15rem; font-weight: 800; color: var(--header-text); }

        /* Koffer-Komposition */
        .scene { margin-top: 160px; display: flex; flex-direction: column; align-items: center; }

        /* Mobile Drehung (Standsäule) */
        @media (max-width: 600px) {
            .scene { transform: rotate(-90deg) scale(0.6); margin-top: 200px; }
        }

        /* Hardware Details */
        .telescope-handle { width: 140px; height: 30px; background: #222; border-radius: 8px 8px 0 0; margin-bottom: -5px; }
        
        .suitcase-body {
            width: 800px; height: 500px; background: var(--alu);
            border-radius: 45px; border: 14px solid var(--alu-dark);
            position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.2);
            background-image: repeating-linear-gradient(90deg, transparent 0, transparent 38px, rgba(0,0,0,0.05) 38px, rgba(0,0,0,0.05) 41px);
        }

        .side-handle {
            position: absolute; top: 50%; right: -25px; transform: translateY(-50%);
            width: 35px; height: 160px; background: #333; border-radius: 0 12px 12px 0;
            display: flex; align-items: center; justify-content: center;
        }
        .side-handle span { color: #777; font-size: 10px; font-weight: 900; transform: rotate(90deg); white-space: nowrap; }

        .wheels { position: absolute; left: -40px; top: 80px; bottom: 80px; display: flex; flex-direction: column; justify-content: space-between; }
        .wheel { width: 45px; height: 75px; background: #111; border-radius: 12px 0 0 12px; border-left: 15px solid #000; }

        .niete { position: absolute; width: 8px; height: 8px; background: #888; border-radius: 50%; box-shadow: inset 1px 1px 2px #000; }

        /* Sticker & Muster-System */
        .sticker {
            position: absolute; padding: 10px 14px; font-weight: 900; text-transform: uppercase;
            border: 3px solid #fff; box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center;
        }
        .sticker:hover { transform: scale(1.15) !important; z-index: 1000 !important; }

        /* Key Cities */
        .key-ny { clip-path: polygon(0% 100%, 0% 20%, 20% 20%, 20% 0%, 40% 0%, 40% 20%, 60% 20%, 60% 5%, 80% 5%, 80% 20%, 100% 20%, 100% 100%); }
        .key-cph { border-radius: 50%; aspect-ratio: 1/1; width: 90px; justify-content: center; }
        .key-aida { border-radius: 50%; border: 8px double red; color: red !important; width: 100px; aspect-ratio: 1/1; justify-content: center; }

        /* Muster (10 Varianten) */
        .p1 { background-image: radial-gradient(rgba(255,255,255,0.3) 15%, transparent 16%); background-size: 8px 8px; }
        .p2 { background-image: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%); background-size: 10px 10px; }
        .p3 { background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.2) 2px, rgba(255,255,255,0.2) 4px); }
        .p4 { background-image: repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(0,0,0,0.05) 4px, rgba(0,0,0,0.05) 5px); }
        .p5 { background-image: radial-gradient(circle at center, rgba(255,255,255,0.4) 1px, transparent 1px); background-size: 5px 5px; }
        .p6 { background-image: linear-gradient(135deg, rgba(255,255,255,0.1) 50%, transparent 50%); background-size: 15px 15px; }
        .p7 { background-image: repeating-radial-gradient(circle, transparent, transparent 5px, rgba(255,255,255,0.1) 5px, rgba(255,255,255,0.1) 6px); }
        .p8 { background-image: linear-gradient(to right, rgba(255,255,255,0.2) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.2) 1px, transparent 1px); background-size: 10px 10px; }
        .p9 { background-image: skew(20deg); } /* Placeholder für Transformation */
        .p10 { border-style: dashed; }

        /* Zentrales Dossier */
        #dossier {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); opacity: 0; pointer-events: none;
            transition: 0.3s ease; border: 1px solid #eee; z-index: 1500;
        }
        #dossier.active { opacity: 1; pointer-events: auto; }
        .d-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .d-row strong { color: #1e293b; }
        .d-desc { font-size: 12px; color: #64748b; margin-top: 12px; font-style: italic; border-top: 1px solid #f0f0f0; padding-top: 10px; }

    </style>
</head>
<body>

    <header><h1>Reisekoffer</h1></header>

    <div class="scene">
        <div class="telescope-handle"></div>
        <div class="suitcase-body" id="suitcase">
            <div class="wheels">
                <div class="wheel"></div>
                <div class="wheel"></div>
            </div>
            <div class="side-handle"><span>RIMOWA KÖLN</span></div>
            
            <script>
                const suit = document.getElementById('suitcase');
                for(let i=0; i<15; i++) {
                    const nTop = document.createElement('div'); nTop.className = 'niete'; nTop.style.top='15px'; nTop.style.left=(50 + i*50)+'px';
                    const nBottom = document.createElement('div'); nBottom.className = 'niete'; nBottom.style.bottom='15px'; nBottom.style.left=(50 + i*50)+'px';
                    suit.appendChild(nTop); suit.appendChild(nBottom);
                }
            </script>

            <div id="dossier">
                <h3 id="d-city" style="margin-bottom: 15px;">City</h3>
                <div class="d-row"><span>Nächte:</span> <strong id="d-nights">0</strong></div>
                <div class="d-row"><span>Fußball:</span> <span id="d-fb">⚪</span></div>
                <p class="d-desc" id="d-desc"></p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('suitcase');
        const dossier = document.getElementById('dossier');

        const COLORS = ['#D4E6B5', '#B5D8E6', '#E6B5B5', '#D1B5E6', '#E6D9B5', '#B5E6D2', '#CDE6B5', '#E6CDB5', '#F5F5DC', '#A8DADC'];
        const DATA = [
            { n: "Kopenhagen", nights: 4, key: "key-cph", fb: true, desc: "Design & Hygge am Nyhavn." },
            { n: "New York", nights: 4, key: "key-ny", fb: false, desc: "Concrete jungle where dreams are made of." },
            { n: "Mainz", nights: 1, key: "rect", fb: true, desc: "Weinkultur am Rhein." },
            { n: "AIDA", nights: 10, key: "key-aida", fb: false, desc: "10 Tage volle Erholung auf See." }
        ];

        // 80 Städte generieren
        for(let i=4; i<80; i++) {
            DATA.push({ n: "Stadt "+i, nights: Math.floor(Math.random()*4)+1, key: "rect", fb: Math.random()>0.7, desc: "Ein weiterer Stop auf der Reise." });
        }

        function createStickers() {
            DATA.forEach((city, i) => {
                const s = document.createElement('div');
                const col = COLORS[i % 10];
                const pat = "p" + ((i % 10) + 1);
                
                s.className = `sticker ${city.key} ${pat}`;
                
                // Absolute Willkür-Positionierung
                const t = Math.random() * 75 + 10;
                const l = Math.random() * 75 + 10;
                const r = (Math.random() * 30) - 15;
                const size = 8 + (city.nights * 1.5);

                s.style.cssText = `
                    background-color: ${col};
                    top: ${t}%; left: ${l}%;
                    transform: rotate(${r}deg);
                    font-size: ${size}px;
                    z-index: ${city.nights};
                `;

                s.innerHTML = city.n;

                s.onmouseenter = () => {
                    document.getElementById('d-city').innerText = city.n;
                    document.getElementById('d-nights').innerText = city.nights;
                    document.getElementById('d-fb').innerText = city.fb ? "⚽ Ja" : "⚪ Nein";
                    document.getElementById('d-desc').innerText = city.desc;
                    dossier.classList.add('active');
                };

                canvas.appendChild(s);
            });
        }

        canvas.onmouseleave = () => dossier.classList.remove('active');
        createStickers();
    </script>
</body>
</html>
