<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Demo | NYC USA</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --usa-blue: #002868;
            --usa-red: #bf0a30;
            --usa-white: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #0f172a; }
        }

        body {
            background: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: -apple-system, sans-serif;
        }

        /* Der weiße Schnittrand des Stickers */
        .sticker-die-cut {
            filter: drop-shadow(0 0 1px rgba(0,0,0,0.3)) 
                    drop-shadow(0 4px 0px white) 
                    drop-shadow(0 8px 15px rgba(0,0,0,0.4));
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .sticker-die-cut:hover {
            transform: scale(1.05) rotate(3deg);
        }

        .apple-shape {
            width: 280px;
            height: 280px;
            position: relative;
            /* Apfel-Silhouette mit Anbiss rechts oben */
            clip-path: polygon(50% 0%, 75% 5%, 85% 15%, 83% 25%, 95% 35%, 100% 50%, 95% 75%, 85% 90%, 50% 100%, 15% 90%, 5% 75%, 0% 50%, 5% 35%, 15% 15%, 25% 5%);
            
            /* USA FAHNE ALS HINTERGRUND */
            background: 
                /* 1. Das blaue Feld mit Sternen (vereinfacht als Punkte) */
                radial-gradient(circle, white 15%, transparent 16%) 0 0 / 20px 20px,
                var(--usa-blue);
            background-size: 15px 15px, 45% 45%;
            background-repeat: repeat, no-repeat;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Die roten Streifen (über das blaue Feld gelegt) */
        .apple-shape::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                var(--usa-red),
                var(--usa-red) 14.28%,
                var(--usa-white) 14.28%,
                var(--usa-white) 28.56%
            );
            /* Lässt das blaue Feld oben links frei */
            clip-path: polygon(45% 0, 100% 0, 100% 100%, 0 100%, 0 45%, 45% 45%);
            z-index: 1;
        }

        /* Typografie */
        .label {
            position: relative;
            z-index: 10;
            background: white;
            color: var(--usa-blue);
            padding: 5px 20px;
            font-weight: 900;
            font-size: 32px;
            letter-spacing: -1px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transform: rotate(-5deg);
            border: 2px solid var(--usa-blue);
        }

        .sub-label {
            position: relative;
            z-index: 10;
            margin-top: 10px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: 700;
            font-size: 14px;
        }

        /* Apfel-Stiel */
        .stem {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 12px; height: 30px;
            background: #4a2f1b;
            z-index: 5;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="sticker-die-cut">
        <div class="stem"></div>
        <div class="apple-shape">
            <div class="label">New York</div>
            <div class="sub-label">Est. 1624</div>
        </div>
    </div>

</body>
</html>
