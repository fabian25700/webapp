<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life-Log | Rimowa Edition</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --alu: #bdc3c7;
            --alu-dark: #7f8c8d;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #0f172a; --header-bg: rgba(15, 23, 42, 0.9); --header-text: #f1f5f9; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background: var(--bg-color);
            font-family: -apple-system, sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px; display: flex; align-items: center; gap: 15px;
            background: var(--header-bg); backdrop-filter: blur(15px);
        }
        header h1 { font-size: 1.1rem; color: var(--header-text); font-weight: 800; }

        /* Koffer-Konstruktion */
        .suitcase-scene {
            margin-top: 100px;
            display: flex; flex-direction: column; align-items: center;
            perspective: 1000px;
        }

        /* Mobile Drehung */
        @media (max-width: 600px) {
            .suitcase-scene { transform: rotate(90deg) scale(0.6); margin-top: 150px; }
        }

        .suitcase-body {
            width: 800px; height: 500px;
            background: var(--alu);
            border-radius: 40px; border: 10px solid var(--alu-dark);
            position: relative;
            background-image: repeating-linear-gradient(90deg, transparent 0, transparent 40px, rgba(0,0,0,0.05) 40px, rgba(0,0,0,0.05) 42px);
            box-shadow: 0 50px 100px rgba(0,0,0,0.3);
        }

        /* Griffe & Rollen */
        .handle-top { width: 120px; height: 25px; background: #333; border-radius: 5px; margin-bottom: -5px; }
        .handle-side {
            position: absolute; right: -22px; top: 50%; transform: translateY(-50%);
            width: 30px; height: 140px; background: #222; border-radius: 0 10px 10px 0;
            display: flex; align-items: center; justify-content: center;
        }
        .handle-side span { 
            color: #555; transform: rotate(90deg); font-size: 8px; 
            font-weight: 900; white-space: nowrap; letter-spacing: 1px;
        }

        .wheel-area { position: absolute; left: -35px; top: 50px; bottom: 50px; display: flex; flex-direction: column; justify-content: space-between; }
        .wheel { width: 40px; height: 60px; background: #111; border-radius: 8px 0 0 8px; border-left: 10px solid #000; }

        /* Zentrales Dossier */
        #central-info {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 240px; background: white; border-radius: 15px; padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s;
            border: 1px solid #ddd;
        }
        #central-info.active { opacity: 1; }
        .dossier-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }

        /* Sticker Styles */
        .sticker {
            position: absolute;
            padding: 8px 12px;
            font-weight: 900;
            text-transform: uppercase;
            border: 3px solid white; /* Sticker Rand */
            box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.2s;
            display: flex; flex-direction: column; align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .sticker:active, .sticker:hover { transform: scale(1.15) !important; z-index: 900 !important; }

        .st-key { border-radius: 10px; }
        .st-standard { border-radius: 2px; }
    </style>
</head>
<body>

    <header>
        <div style="width: 36px; height: 36px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold;">←</div>
        <h1>Passport & Luggage</h1>
    </header>

    <div class="suitcase-scene">
        <div class="handle-top"></div>
        <div class="suitcase-body" id="canvas">
            <div class="wheel-area">
                <div class="wheel"></div>
                <div class="wheel"></div>
            </div>
            <div class="handle-side"><span>RIMOWA KÖLN</span></div>
            
            <div id="central-info">
                <h3 id="info-city" style="margin-bottom: 10px;">City</h3>
                <div class="dossier-row"><span>Land:</span> <strong id="info-country">-</strong></div>
                <div class="dossier-row"><span>Nächte:</span> <strong id="info-nights">-</strong></div>
                <div class="dossier-row"><span>Fußball:</span> <strong id="info-fb">-</strong></div>
                <p id="info-desc" style="font-size: 11px; margin-top: 10px; color: #666; font-style: italic;"></p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const infoBox = document.getElementById('central-info');

        const DATA = [
            { n: "Kopenhagen", key: true, nights: 4, flag: "🇩🇰", fb: true, desc: "Design & Hygge.", icon: "🚲" },
            { n: "New York", key: true, nights: 4, flag: "🇺🇸", fb: false, desc: "The city that never sleeps.", icon: "🗽" },
            { n: "Mainz", key: false, nights: 1, flag: "🇩🇪", fb: true, desc: "Rheinhessen Wein.", icon: "🍇" },
            { n: "AIDA", key: true, nights: 10, flag: "🚢", fb: false, desc: "Vollpension auf Wellen.", icon: "⚓" }
        ];

        // Fülle auf 80 auf
        for(let i=4; i<80; i++) {
            DATA.push({
                n: "City "+i, key: false, nights: Math.floor(Math.random()*3)+1,
                flag: "🇪🇺", fb: Math.random()>0.5, desc: "Reise-Erinnerung.", icon: "📍"
            });
        }

        const COLORS = ['#e63946', '#f1faee', '#a8dadc', '#457b9d', '#ffb703', '#2a9d8f'];

        function build() {
            DATA.forEach((city, i) => {
                const s = document.createElement('div');
                s.className = `sticker ${city.key ? 'st-key' : 'st-standard'}`;
                
                const color = COLORS[i % COLORS.length];
                const fontSize = 8 + (city.nights * 2);
                const rot = (Math.random() * 10) - 5;
                
                // Positionierung (Absolute Layering für Überlappung)
                const top = Math.random() * 75 + 5;
                const left = Math.random() * 75 + 5;

                s.style.cssText = `
                    background: ${color}; 
                    color: ${getContrast(color)};
                    top: ${top}%; left: ${left}%;
                    transform: rotate(${rot}deg);
                    font-size: ${fontSize}px;
                `;

                s.innerHTML = `${city.key ? `<span style="font-size:1.5em">${city.icon}</span>` : ''} <span>${city.n}</span>`;
                
                // Interaction
                const showInfo = () => {
                    document.getElementById('info-city').innerText = city.flag + " " + city.n;
                    document.getElementById('info-country').innerText = city.flag;
                    document.getElementById('info-nights').innerText = city.nights;
                    document.getElementById('info-fb').innerText = city.fb ? "⚽ Ja" : "⚪ Nein";
                    document.getElementById('info-desc').innerText = city.desc;
                    infoBox.classList.add('active');
                };

                s.addEventListener('mouseenter', showInfo);
                s.addEventListener('touchstart', (e) => { e.preventDefault(); showInfo(); });
                
                canvas.appendChild(s);
            });
        }

        canvas.addEventListener('mouseleave', () => infoBox.classList.remove('active'));

        function getContrast(hex){
            hex = hex.replace('#','');
            const r = parseInt(hex.substr(0,2),16);
            const g = parseInt(hex.substr(2,2),16);
            const b = parseInt(hex.substr(4,2),16);
            return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? 'black' : 'white';
        }

        build();
    </script>
</body>
</html>
