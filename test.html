<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Passport</title>
    <script src="daten.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --header-border: #e2e8f0;
            --btn-bg: #ffffff;
            --btn-border: #e2e8f0;
            --btn-text: #1e293b;
            --passport-green-soft: #e8f2e9;
            --ink-dark: #1a3a16;
            --border-page: #d1ddd2;
            --text-secondary: #7a8c7b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --header-bg: rgba(15, 23, 42, 0.9);
                --header-text: #f1f5f9;
                --header-border: #1e293b;
                --btn-bg: #1e293b;
                --btn-border: #2d3f55;
                --btn-text: #f1f5f9;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            text-decoration: none; color: var(--btn-text);
            -webkit-tap-highlight-color: transparent;
        }

        header h1 { color: var(--header-text); font-size: 1.15rem; font-weight: 800; }

        .book-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            height: 100vh;
            padding-top: 100px;
            scrollbar-width: none;
            will-change: scroll-position;
            -webkit-overflow-scrolling: touch;
        }
        .book-container::-webkit-scrollbar { display: none; }

        .page {
            flex: 0 0 100vw;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .page-inner {
            width: 100%; max-width: 360px; height: 580px;
            background: var(--passport-green-soft);
            border-radius: 15px; position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            padding: 25px 20px;
            border: 1px solid var(--border-page);
            display: flex; flex-direction: column;
            overflow: hidden;
            z-index: 1;
        }

        /* Adler Fix: Fixierte Positionierung und expliziter Content-Pfad */
        .page-inner::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            margin-top: -100px;
            margin-left: -100px;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/d/da/Coat_of_arms_of_Germany.svg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.05;
            pointer-events: none;
            z-index: -1;
        }

        .page-header {
            text-align: center; font-size: 0.65rem; font-weight: 700;
            color: var(--text-secondary); text-transform: uppercase;
            letter-spacing: 2px; border-bottom: 1px solid var(--border-page);
            padding-bottom: 10px; margin-bottom: 20px;
        }

        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px; flex: 1;
        }

        .stamp-slot {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stamp {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 8px; text-align: center;
            border: 2.5px solid;
            background: rgba(232, 242, 233, 0.1);
        }

        .stamp-circle { border-radius: 50%; width: 105px; height: 105px; }
        .stamp-rect   { border-radius: 4px; width: 120px; min-height: 80px; }
        .stamp-hex    { border-radius: 10px; transform: skewX(-4deg); width: 115px; min-height: 90px; }

        .stamp .land {
            font-weight: 900; 
            font-size: 0.65rem; /* Etwas kleiner für Handy-Optimierung */
            text-transform: uppercase; 
            line-height: 1.1;
            max-width: 95px;
            overflow-wrap: break-word; /* Bricht an sinnvollen Stellen */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .stamp .jahr {
            font-size: 1.1rem; font-weight: 900;
            border-top: 2px solid; border-bottom: 2px solid;
            margin: 4px 0; padding: 0 6px;
        }

        .stamp .type {
            font-size: 0.4rem; letter-spacing: 1px;
            font-weight: 800; opacity: 0.8;
        }

        .stamp-aged { filter: blur(0.4px); }

        .page-footer {
            text-align: center; font-size: 0.7rem; font-weight: 800;
            color: var(--ink-dark); text-transform: uppercase;
            margin-top: 15px; padding-top: 10px;
            border-top: 1px solid var(--border-page);
        }
    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Passport</h1>
    </header>

    <div class="book-container" id="book-container"></div>

    <script>
        const COLORS = ['#1e3a8a', '#991b1b', '#064e3b', '#581c87', '#78350f'];
        const SHAPES = ['circle', 'rect', 'hex'];
        const STAMPS_PER_PAGE = 6;
        const AKTUELLES_JAHR = 2026;

        function hashStr(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) {
                h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
            }
            return Math.abs(h);
        }

        function buildStampHTML(reise) {
            const h        = hashStr(reise.Land);
            const color    = COLORS[h % COLORS.length];
            const shape    = SHAPES[(h >> 3) % SHAPES.length];
            const rotation = ((h % 10) - 5);
            const reiseJahr = reise["erste Einreise"] || AKTUELLES_JAHR;
            const alter    = AKTUELLES_JAHR - reiseJahr;
            const opacity  = Math.max(0.6, 0.95 - alter * 0.015).toFixed(3);
            const agedClass = alter > 15 ? ' stamp-aged' : '';

            return `<div class="stamp stamp-${shape}${agedClass}" 
                        style="color:${color}; border-color:${color}; opacity:${opacity}; transform:rotate(${rotation}deg)">
                        <div class="type">ENTRY</div>
                        <div class="land">${reise.Land}</div>
                        <div class="jahr">${reiseJahr}</div>
                        <div class="type">IMMIGRATION</div>
                    </div>`;
        }

        function renderPassport() {
            const container = document.getElementById('book-container');
            if (!window.MEINE_REISEN) return;

            const reisen = MEINE_REISEN
                .filter(r => r.Land !== 'Deutschland')
                .sort((a, b) => (b["erste Einreise"] || 2000) - (a["erste Einreise"] || 2000));

            const totalPages = Math.ceil(reisen.length / STAMPS_PER_PAGE);
            const fragment = document.createDocumentFragment();

            for (let p = 0; p < totalPages; p++) {
                const pageItems = reisen.slice(p * STAMPS_PER_PAGE, (p + 1) * STAMPS_PER_PAGE);
                const stampsHTML = pageItems.map(buildStampHTML)
                    .map(s => `<div class="stamp-slot">${s}</div>`)
                    .join('');

                const page = document.createElement('div');
                page.className = 'page';
                page.innerHTML = `
                    <div class="page-inner">
                        <div class="page-header">Visa — Seite ${p + 1}</div>
                        <div class="stamp-grid">${stampsHTML}</div>
                        <div class="page-footer">Fabian Geisbüsch</div>
                    </div>`;

                fragment.appendChild(page);
            }
            container.appendChild(fragment);
        }

        requestAnimationFrame(renderPassport);
    </script>
</body>
</html>
