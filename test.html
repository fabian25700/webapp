<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Länder | Analytics</title>
    <script src="daten.js"></script>
    <style>
        :root {
            --accent: #e67e22;
            --bg: #f2f2f7;
            --surface: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --border: #d1d1d6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --surface: #1c1c1e;
                --text-primary: #ffffff;
                --text-secondary: #8e8e93;
                --border: #38383a;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            padding-bottom: 30px;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: calc(env(safe-area-inset-top) + 15px) 20px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 0.5px solid var(--border);
        }

        .back-btn { text-decoration: none; color: var(--accent); font-weight: 500; }
        h1 { font-size: 17px; font-weight: 600; }

        main { padding: 12px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }

        .card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 0.5px solid var(--border);
        }

        .card-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .flag { font-size: 24px; }
        .name { flex: 1; font-size: 16px; font-weight: 600; }

        .main-stat { text-align: right; }
        .stat-val { font-size: 18px; font-weight: 700; display: block; }
        .stat-lbl { font-size: 9px; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; }

        .details {
            display: none;
            padding: 12px 16px;
            background: rgba(0,0,0,0.02);
            border-top: 0.5px solid var(--border);
        }

        .card.open .details { display: block; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .sub-stat {
            display: flex;
            flex-direction: column;
        }

        .sub-val { font-size: 15px; font-weight: 600; }
        .sub-lbl { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; }

        .jog-line {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 0.5px solid var(--border);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">Zurück</a>
        <h1>Reise-Analytics</h1>
        <div id="count" style="font-size: 13px; font-weight: 600; opacity: 0.6;"></div>
    </header>

    <main id="list"></main>

    <script>
        window.onload = function() {
            const list = document.getElementById('list');
            const data = [...MEINE_REISEN].sort((a, b) => b.Übernachtungen - a.Übernachtungen);
            document.getElementById('count').textContent = data.length + ' LÄNDER';

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
                        <span class="flag">${item.flagge}</span>
                        <span class="name">${item.Land}</span>
                        <div class="main-stat">
                            <span class="stat-val">${item.Übernachtungen}</span>
                            <span class="stat-lbl">Nächte</span>
                        </div>
                    </div>
                    <div class="details">
                        <div class="stats-grid">
                            <div class="sub-stat">
                                <span class="sub-val">${item.Unterkünfte}</span>
                                <span class="sub-lbl">Unterkünfte</span>
                            </div>
                            <div class="sub-stat">
                                <span class="sub-val">${item.FluegeAnkunft}</span>
                                <span class="sub-lbl">Flüge</span>
                            </div>
                            <div class="sub-stat">
                                <span class="sub-val">${item["UNESCO Welterbe"]}</span>
                                <span class="sub-lbl">UNESCO</span>
                            </div>
                        </div>
                        ${item.km_gejoggt > 0 ? `
                        <div class="jog-line">
                            <span style="color: var(--text-secondary);">Absolute Laufleistung</span>
                            <span style="font-weight: 700; color: var(--accent);">${item.km_gejoggt} KM</span>
                        </div>` : ''}
                    </div>
                `;
                list.appendChild(card);
            });
        };
    </script>
</body>
</html>
