<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reisekoffer | Fabian Geisbüsch</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --header-border: #e2e8f0;
            --card-bg: #ffffff;
            --text-secondary: #64748b;
            --alu-base: #bdc3c7;
            --alu-dark: #9da4a7;
            --alu-bright: #e1e4e6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --header-bg: rgba(15, 23, 42, 0.9);
                --header-text: #f1f5f9;
                --header-border: #1e293b;
                --card-bg: #1e293b;
                --alu-base: #7f8c8d;
                --alu-dark: #2c3e50;
                --alu-bright: #bdc3c7;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            background: var(--bg-color);
            font-family: -apple-system, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 2000;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            background: var(--header-bg); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }
        header h1 { color: var(--header-text); font-size: 1.15rem; font-weight: 800; }

        .back-btn {
            width: 36px; height: 36px; background: white; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border: 1px solid #ddd; text-decoration: none; color: black;
        }

        .viewport {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            width: 100%;
        }

        .suitcase-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @media (max-width: 600px) {
            .suitcase-container { transform: rotate(-90deg) scale(0.45); }
        }

        /* Teleskopgriff */
        .telescope-system {
            width: 160px; height: 50px; position: relative; margin-bottom: -15px; z-index: 0;
        }
        .rail {
            position: absolute; width: 16px; height: 100%;
            background: linear-gradient(to right, #333, #555, #333);
            border-radius: 4px 4px 0 0; border: 1px solid #1a1a1a;
        }
        .rail.left { left: 25px; }
        .rail.right { right: 25px; }
        .handle-bar {
            position: absolute; top: 0; left: 10px; right: 10px; height: 26px;
            background: linear-gradient(to bottom, #2a2a2a, #0a0a0a, #000);
            border-radius: 8px; border: 1px solid #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .handle-bar::after {
            content: "RIMOWA";
            font-size: 9px; font-weight: 900; letter-spacing: 3px;
            background: linear-gradient(135deg, #fff 0%, #eee 40%, #ccc 50%, #eee 60%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Koffer-Korpus */
        .suitcase-body {
            width: 820px; height: 520px;
            background: var(--alu-base);
            border-radius: 54px; border: 14px solid var(--alu-dark);
            position: relative; z-index: 1;
            box-shadow: 0 50px 100px rgba(0,0,0,0.3);
            background-image: 
                repeating-linear-gradient(90deg, 
                    rgba(255,255,255,0.08) 0, rgba(255,255,255,0.08) 38px, 
                    rgba(0,0,0,0.08) 38px, rgba(0,0,0,0.08) 42px
                ),
                radial-gradient(circle at 50% 50%, var(--alu-bright), var(--alu-base));
        }

        /* Sticker Styles */
        .sticker {
            position: absolute;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 10px;
            text-transform: uppercase;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            z-index: 10;
            border: 2px solid rgba(255,255,255,0.2);
            text-align: center;
            padding: 5px;
        }
        .sticker:hover { transform: scale(1.1) rotate(0deg) !important; z-index: 100; }

        .niete {
            position: absolute; width: 8px; height: 8px;
            background: radial-gradient(circle at 3px 3px, var(--alu-bright), #7f8c8d);
            border-radius: 50%; box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            z-index: 5;
        }

        #central-info {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: var(--card-bg); border-radius: 20px; padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            z-index: 1500; opacity: 0; pointer-events: none; transition: 0.3s;
            border: 1px solid var(--header-border);
            text-align: center;
        }
        #central-info.active { opacity: 1; pointer-events: auto; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: var(--text-secondary); }
        .info-row strong { color: var(--header-text); }
        .info-desc { margin-top: 15px; font-style: italic; font-size: 13px; color: var(--text-secondary); border-top: 1px solid var(--header-border); padding-top: 10px;}
    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Reisekoffer</h1>
    </header>

    <div class="viewport" onclick="hideDossier()">
        <div class="suitcase-container" onclick="event.stopPropagation()">
            <div class="telescope-system">
                <div class="rail left"></div>
                <div class="rail right"></div>
                <div class="handle-bar"></div>
            </div>

            <div class="suitcase-body" id="canvas">
                <div id="central-info">
                    <div style="margin-bottom:15px;"><h3 id="info-city" style="font-size:1.4rem;">-</h3></div>
                    <div class="info-row"><span>Land:</span> <strong id="info-country">-</strong></div>
                    <div class="info-row"><span>Nächte:</span> <strong id="info-nights">-</strong></div>
                    <div class="info-row"><span>Fußball:</span> <strong id="info-fb">-</strong></div>
                    <p class="info-desc" id="info-desc">-</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const info = document.getElementById('central-info');

        const reiseDaten = [
            { stadt: "Kopenhagen", top10: true, naechte: 4, fussball: true, notiz: "Papa's 60. Geburtstag", land: "Dänemark", farbe: "#C8102E", form: "circle" },
            { stadt: "New York", top10: true, naechte: 4, fussball: false, notiz: "Januar 2024", land: "USA", farbe: "#002868", form: "rect" },
            { stadt: "Mainz", top10: false, naechte: 1, fussball: true, notiz: "Feueralarm in der Nacht", land: "Deutschland", farbe: "#FF0000", form: "rect" },
            { stadt: "AIDA", top10: true, naechte: 10, fussball: false, notiz: "Mehrfach", land: "International", farbe: "#005DAA", form: "octagon" },
            { stadt: "Dubai", top10: true, naechte: 9, fussball: true, land: "VAE", farbe: "#00732F", form: "diamond" },
            { stadt: "Köln", top10: false, naechte: 1, fussball: true, land: "Deutschland", farbe: "#FF0000", form: "rect" },
            { stadt: "Erfurt", top10: false, naechte: 1, fussball: false, land: "Deutschland", farbe: "#FF0000", form: "rect" },
            { stadt: "Stockholm", top10: true, naechte: 4, fussball: true, land: "Schweden", farbe: "#006AA7", form: "hexagon" },
            { stadt: "Le Morne", top10: true, naechte: 5, fussball: false, land: "Mauritius", farbe: "#EA2839", form: "circle" }
        ];

        function placeRivets() {
            const w = 820, h = 520, step = 60;
            for(let x = step; x < w - step; x += step) { addRivet(x, 15); addRivet(x, h - 45); }
            for(let y = step; y < h - step; y += step) { addRivet(15, y); addRivet(w - 45, y); }
        }

        function addRivet(x, y) {
            const r = document.createElement('div');
            r.className = 'niete';
            r.style.left = x + 'px'; r.style.top = y + 'px';
            canvas.appendChild(r);
        }

        function createStickers() {
            const usedAreas = [];
            reiseDaten.filter(d => d.top10).forEach(data => {
                const s = document.createElement('div');
                s.className = 'sticker';
                s.innerText = data.stadt;
                
                // Design
                const size = 60 + (data.naechte * 10);
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.backgroundColor = data.farbe;
                s.style.color = "#fff";
                
                if(data.form === 'circle') s.style.borderRadius = '50%';
                if(data.form === 'octagon') s.style.clipPath = 'polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%)';
                if(data.form === 'hexagon') s.style.clipPath = 'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)';
                if(data.form === 'diamond') s.style.clipPath = 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)';

                // Positionierung (Wirr aber ohne Überlappung)
                let x, y, collision, attempts = 0;
                do {
                    collision = false;
                    x = Math.random() * (820 - size - 100) + 50;
                    y = Math.random() * (520 - size - 100) + 50;
                    
                    // Zentrale Info-Zone freihalten
                    if (x > 260 && x < 560 && y > 150 && y < 370) collision = true;

                    for(let area of usedAreas) {
                        if(!(x + size < area.x || x > area.x + area.w || y + size < area.y || y > area.y + area.h)) {
                            collision = true;
                        }
                    }
                    attempts++;
                } while(collision && attempts < 100);

                usedAreas.push({x: x, y: y, w: size, h: size});
                s.style.left = x + 'px';
                s.style.top = y + 'px';
                s.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;

                // Events
                const show = () => showDossier(data);
                s.addEventListener('mouseenter', show);
                s.addEventListener('touchstart', (e) => { e.stopPropagation(); show(); });

                canvas.appendChild(s);
            });
        }

        function showDossier(data) {
            document.getElementById('info-city').innerText = data.stadt;
            document.getElementById('info-country').innerText = data.land;
            document.getElementById('info-nights').innerText = data.naechte;
            document.getElementById('info-fb').innerText = data.fussball ? "Ja ⚽" : "Nein";
            document.getElementById('info-desc').innerText = data.notiz || "Keine besonderen Vorkommnisse.";
            info.classList.add('active');
        }

        function hideDossier() {
            info.classList.remove('active');
        }

        placeRivets();
        createStickers();
    </script>
</body>
</html>
