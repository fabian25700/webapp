<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Passport</title>
    <script src="daten.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5; 
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --header-border: #e2e8f0;
            --btn-bg: #ffffff;
            --btn-border: #e2e8f0;
            --btn-text: #1e293b;
            --passport-green-soft: #e8f2e9; 
            --ink-dark: #1a3a16;
            --border-page: #d1ddd2;
            --text-secondary: #7a8c7b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --header-bg: rgba(15, 23, 42, 0.9);
                --header-text: #f1f5f9;
                --header-border: #1e293b;
                --btn-bg: #1e293b;
                --btn-border: #2d3f55;
                --btn-text: #f1f5f9;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            background: var(--header-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            text-decoration: none; color: var(--btn-text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        header h1 { color: var(--header-text); font-size: 1.15rem; font-weight: 800; }

        .book-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            height: 100vh;
            padding-top: 100px;
            scrollbar-width: none;
        }
        .book-container::-webkit-scrollbar { display: none; }

        .page {
            flex: 0 0 100vw;
            scroll-snap-align: start;
            display: flex; justify-content: center; padding: 10px;
        }

        .page-inner {
            width: 100%; max-width: 380px; height: 620px;
            background: var(--passport-green-soft);
            border-radius: 15px; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 25px 20px;
            border: 1px solid var(--border-page);
            display: flex; flex-direction: column;
        }

        .page-inner::before {
            content: ' ';
            position: absolute; top: 50%; left: 50%;
            width: 220px; height: 220px;
            transform: translate(-50%, -50%);
            background: url('https://upload.wikimedia.org/wikipedia/commons/d/da/Coat_of_arms_of_Germany.svg') no-repeat center;
            background-size: contain;
            opacity: 0.04; pointer-events: none;
        }

        .page-header {
            text-align: center; font-size: 0.65rem; font-weight: 700;
            color: var(--text-secondary); text-transform: uppercase;
            letter-spacing: 2px; border-bottom: 1px solid var(--border-page);
            padding-bottom: 10px; margin-bottom: 20px;
        }

        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px; flex: 1;
        }

        .stamp-slot { display: flex; align-items: center; justify-content: center; }

        .stamp {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            mix-blend-mode: multiply;
            padding: 10px;
            text-align: center;
        }

        .stamp-circle { border: 3px solid; border-radius: 50%; width: 100px; height: 100px; }
        .stamp-rect { border: 3px solid; border-radius: 4px; width: 115px; height: 80px; }
        .stamp-hex { border: 3px solid; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); width: 100px; height: 100px; }

        .stamp .land { font-weight: 900; font-size: 0.8rem; text-transform: uppercase; line-height: 1; margin-bottom: 2px; }
        .stamp .jahr { font-size: 1.2rem; font-weight: 900; border-top: 2px solid; border-bottom: 2px solid; margin: 4px 0; padding: 0 5px; }
        .stamp .type { font-size: 0.5rem; letter-spacing: 1.5px; font-weight: 800; opacity: 0.8; }

        .page-footer {
            text-align: center; font-size: 0.75rem; font-weight: 800;
            color: var(--ink-dark); text-transform: uppercase;
            letter-spacing: 1.5px; margin-top: 20px;
            padding-top: 12px; border-top: 1px solid var(--border-page);
        }
    </style>
</head>
<body>

    <svg style="display: none;">
        <filter id="ink-bleed">
            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
        </filter>
        <filter id="heavy-bleed">
            <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" />
        </filter>
    </svg>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Passport</h1>
    </header>

    <div class="book-container" id="book-container"></div>

    <script>
        const colors = ['#1e3a8a', '#991b1b', '#064e3b', '#581c87', '#78350f'];
        const shapes = ['circle', 'rect', 'hex'];

        function renderPassport() {
            const container = document.getElementById('book-container');
            const reisenFiltered = MEINE_REISEN.filter(r => r.Land !== "Deutschland");
            
            // 1. Sortierung: Neueste zuerst (b - a)
            reisenFiltered.sort((a, b) => (b["erste Einreise"] || 2000) - (a["erste Einreise"] || 2000));

            const stampsPerPage = 6;
            const totalPages = Math.ceil(reisenFiltered.length / stampsPerPage);

            for (let p = 0; p < totalPages; p++) {
                const page = document.createElement('div');
                page.className = 'page';
                
                const pageInner = document.createElement('div');
                pageInner.className = 'page-inner';
                
                const start = p * stampsPerPage;
                const pageItems = reisenFiltered.slice(start, start + stampsPerPage);

                pageInner.innerHTML = `
                    <div class="page-header">Visa - Seite ${p + 1}</div>
                    <div class="stamp-grid" id="grid-${p}"></div>
                    <div class="page-footer">Fabian Geisbüsch</div>
                `;
                
                page.appendChild(pageInner);
                container.appendChild(page);

                const grid = pageInner.querySelector(`#grid-${p}`);
                pageItems.forEach(reise => {
                    const slot = document.createElement('div');
                    slot.className = 'stamp-slot';
                    slot.appendChild(createStamp(reise));
                    grid.appendChild(slot);
                });
            }
        }

        function createStamp(reise) {
            const stampDiv = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            
            const aktuellesJahr = new Date().getFullYear();
            const reiseJahr = reise["erste Einreise"] || 2026;
            const alter = aktuellesJahr - reiseJahr;

            // 2. Optimierte Abnutzung
            // Opacity: Sinkt erst nach ca. 5 Jahren spürbar, Minimum bei 0.5
            const opacity = Math.max(0.5, 0.95 - (Math.max(0, alter - 5) * 0.03)); 
            
            // Unsauberkeit: SVG Filter wird stärker, je älter der Stempel ist
            let inkFilter = 'none';
            if (alter > 15) {
                inkFilter = 'url(#heavy-bleed)';
            } else if (alter > 5) {
                inkFilter = 'url(#ink-bleed)';
            }

            // Minimaler Blur erst bei sehr alten Stempeln
            const blur = alter > 10 ? Math.min(0.8, (alter - 10) * 0.05) : 0;

            stampDiv.className = `stamp stamp-${shape}`;
            stampDiv.style.color = color;
            stampDiv.style.borderColor = color;
            stampDiv.style.opacity = opacity;
            stampDiv.style.filter = `${inkFilter} blur(${blur}px)`;

            const rotation = Math.floor(Math.random() * 16) - 8; 
            const jitterX = Math.floor(Math.random() * 8) - 4;
            const jitterY = Math.floor(Math.random() * 8) - 4;
            
            stampDiv.style.transform = `rotate(${rotation}deg) translate(${jitterX}px, ${jitterY}px)`;

            stampDiv.innerHTML = `
                <div class="type">ENTRY</div>
                <div class="land">${reise.Land}</div>
                <div class="jahr">${reiseJahr}</div>
                <div class="type">IMMIGRATION</div>
            `;

            return stampDiv;
        }

        window.onload = renderPassport;
    </script>
</body>
</html>
