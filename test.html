<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luggage Canvas</title>
    <style>
        :root {
            --alu-base: #b0b3b8;
            --alu-bright: #e1e4e8;
            --alu-shadow: #888a8d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            overflow: hidden;
            font-family: -apple-system, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        /* Der Koffer-Container (Zoom- & Pan-Area) */
        #viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            cursor: grab;
            touch-action: none;
        }

        #suitcase {
            width: 900px; height: 600px;
            background: var(--alu-base);
            background-image: repeating-linear-gradient(
                90deg,
                var(--alu-shadow) 0px,
                var(--alu-shadow) 2px,
                transparent 2px,
                transparent 40px,
                var(--alu-bright) 42px,
                var(--alu-bright) 44px
            );
            border-radius: 40px;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            border: 8px solid #999;
            flex-shrink: 0;
        }

        /* Die Sticker */
        .sticker {
            position: absolute;
            padding: 8px 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center;
            border: 2px solid rgba(255,255,255,0.2);
            user-select: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .sticker:hover { transform: scale(1.1) !important; z-index: 100 !important; }

        /* Sticker-Styles */
        .st-round { border-radius: 50%; width: 70px; height: 70px; justify-content: center; }
        .st-rect { border-radius: 4px; }
        .st-badge { border-radius: 10px 0 10px 0; }

        .icon { font-size: 20px; margin-bottom: 2px; }

        /* Media Query für vertikales Handy-Format */
        @media (max-width: 600px) {
            #suitcase { width: 90vw; height: 140vw; }
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="suitcase"></div>
    </div>

    <script>
        const suit = document.getElementById('suitcase');
        const view = document.getElementById('viewport');

        // Beispiel-Daten (später aus daten.js)
        const CITIES = [
            {n: "New York", i: "🗽", c: "#e63946"},
            {n: "Berlin", i: "🏛️", c: "#f1faee"},
            {n: "Köln", i: "⛪", c: "#a8dadc"},
            {n: "München", i: "🥨", c: "#457b9d"},
            {n: "Paris", i: "🗼", c: "#1d3557"},
            {n: "Aachen", i: "🍰", c: "#f4a261"},
            {n: "London", i: "🎡", c: "#e76f51"},
            {n: "Tokyo", i: "🍣", c: "#2a9d8f"}
        ];

        // Zoom & Pan Logik
        let scale = 0.8;
        let posX = 0, posY = 0;

        function updateTransform() {
            suit.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        view.addEventListener('wheel', e => {
            scale += e.deltaY * -0.001;
            scale = Math.min(Math.max(0.3, scale), 3);
            updateTransform();
        });

        // Sticker generieren (Simulierte 80 Stück)
        function createStickers() {
            for (let i = 0; i < 85; i++) {
                const city = CITIES[i % CITIES.length];
                const sticker = document.createElement('div');
                
                const type = ['st-round', 'st-rect', 'st-badge'][i % 3];
                sticker.className = `sticker ${type}`;
                
                // Zufällige Position (innerhalb des Koffers)
                const top = Math.random() * 80 + 5;
                const left = Math.random() * 80 + 5;
                const rot = (Math.random() * 40) - 20;

                sticker.style.top = `${top}%`;
                sticker.style.left = `${left}%`;
                sticker.style.background = city.c;
                sticker.style.color = getContrastYIQ(city.c);
                sticker.style.transform = `rotate(${rot}deg)`;
                sticker.style.zIndex = i;

                sticker.innerHTML = `<span class="icon">${city.i}</span><span>${city.n}</span>`;
                suit.appendChild(sticker);
            }
        }

        function getContrastYIQ(hexcolor){
            hexcolor = hexcolor.replace("#", "");
            var r = parseInt(hexcolor.substr(0,2),16);
            var g = parseInt(hexcolor.substr(2,2),16);
            var b = parseInt(hexcolor.substr(4,2),16);
            var yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        // Einfaches Drag-to-Pan für Handy & Desktop
        let isDragging = false;
        let startX, startY;

        view.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; view.style.cursor = 'grabbing'; });
        window.addEventListener('mouseup', () => { isDragging = false; view.style.cursor = 'grab'; });
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            posX = e.clientX - startX;
            posY = e.clientY - startY;
            updateTransform();
        });

        // Touch Support
        view.addEventListener('touchstart', e => { 
            isDragging = true; 
            startX = e.touches[0].clientX - posX; 
            startY = e.touches[0].clientY - posY; 
        });
        view.addEventListener('touchmove', e => {
            if (!isDragging) return;
            posX = e.touches[0].clientX - startX;
            posY = e.touches[0].clientY - startY;
            updateTransform();
        });
        view.addEventListener('touchend', () => isDragging = false);

        createStickers();
        updateTransform();
    </script>
</body>
</html>
