<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fabian's Chaos Lab 2.0</title>
    <script src="daten.js"></script>
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --neon-blue: #00e5ff;
            --bg: #050509;
            --surface: #11111d;
            --text: #ffffff;
        }

        body {
            font-family: "SF Mono", "Fira Code", monospace;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px;
            padding-top: calc(env(safe-area-inset-top) + 20px);
            overflow-y: auto;
        }

        h1 { font-size: 1.4rem; text-align: center; text-transform: uppercase; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 25px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }

        h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 15px; text-align: center; }

        /* ── Gimmick 1: Jetlag-Barometer ── */
        .bar-container { height: 12px; background: #222; border-radius: 6px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000); width: 0%; transition: width 1s ease; }
        .bar-label { font-size: 0.7rem; text-align: center; margin-top: 6px; color: var(--neon-red); }

        /* ── Gimmick 2: VWL-Crash-Alarm ── */
        .alarm-card { background: rgba(255, 51, 102, 0.1); border: 2px solid var(--neon-red); animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 rgba(255,51,102,0.4); } 70% { box-shadow: 0 0 15px rgba(255,51,102,0.8); } 100% { box-shadow: 0 0 0 rgba(255,51,102,0.4); } }
        .bip-val { font-size: 1.8rem; font-weight: 900; text-align: center; color: var(--neon-red); }

        /* ── Gimmick 3: 1-rein-2-raus Inventar ── */
        #minimal-counter { font-size: 2.5rem; font-weight: 900; text-align: center; color: var(--neon-green); }

        /* ── Gimmick 4: Global Run Matrix ── */
        .matrix-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .matrix-cell { width: 100%; padding-bottom: 100%; background: #222; border-radius: 2px; }
        .matrix-cell.active { background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); animation: matrix-blink 2s infinite alternate; }
        @keyframes matrix-blink { from { opacity: 0.2; } to { opacity: 1; } }

        /* ── Button ── */
        .control-btn { 
            grid-column: span 2; background: #222; border: 1px solid #444; color: #fff;
            padding: 12px; border-radius: 10px; font-weight: bold; font-family: monospace;
            cursor: pointer; transition: all 0.2s;
        }
        .control-btn:active { background: #333; transform: scale(0.98); }

    </style>
</head>
<body>

    <h1>PERFORMANCE DASHBOARD</h1>

    <div class="menu-container" id="main-menu">
        <a href="reise_stats.html" class="menu-card">
            <span class="icon">🌍</span>
            <span class="title">Reisen</span>
            <span class="arrow">→</span>
        </a>
        <a href="alltag.html" class="menu-card">
            <span class="icon">🏠</span>
            <span class="title">Alltag</span>
            <span class="arrow">→</span>
        </a>
        <a href="passport.html" class="menu-card">
            <span class="icon">🛂</span>
            <span class="title">Passport</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <div class="grid">
        
        <div class="card">
            <h2>Hormon-Status</h2>
            <div class="bar-container">
                <div id="jetlag-bar" class="bar-fill"></div>
            </div>
            <p class="bar-label" id="jetlag-status">Loading...</p>
        </div>

        <div id="vpw-card" class="card">
            <h2>VWL-Index</h2>
            <div id="bip-value" class="bip-val">404</div>
            <p style="font-size: 0.6rem; text-align: center; color: #999;">Markteintritts-Score</p>
        </div>

        <div class="card">
            <h2>Minimalismus</h2>
            <div id="minimal-counter">-000</div>
            <p style="font-size: 0.6rem; text-align: center; color: #999;">Digitale Assets verbleibend</p>
        </div>

        <div class="card">
            <h2>Run Matrix</h2>
            <div class="matrix-grid" id="matrix-grid"></div>
        </div>

        <button class="control-btn" onclick="simulateNewAsset()">Neues Asset gekauft (CRASH RISIKO)</button>
        <button class="control-btn" onclick="simulateRun()">Lauf absolvieren (Pace-Boost)</button>
        <button class="control-btn" style="background: var(--neon-red);" onclick="resetLab()">System-Reset</button>

    </div>

    <script>
        // Daten laden (Fallbacks, falls daten.js fehlt)
        const reisen = typeof MEINE_REISEN !== 'undefined' ? MEINE_REISEN : [];
        let itemsCount = -reisen.length * 2; // Simulierter Minimalismus-Start

        function initChaosLab() {
            // 1. Jetlag (je mehr Länder, desto roter)
            const jetlagFill = document.getElementById('jetlag-bar');
            const jetlagStatus = document.getElementById('jetlag-status');
            const percent = Math.min(100, reisen.length * 5);
            jetlagFill.style.width = percent + '%';
            jetlagStatus.innerText = percent > 80 ? 'CRITICAL - CORTISOL SPIKE' : 'STABLE';

            // 2. VWL-Index
            updateVWL();

            // 3. Minimalismus
            updateMinimal();

            // 4. Matrix Grid
            const grid = document.getElementById('matrix-grid');
            grid.innerHTML = '';
            for(let i=0; i<35; i++) {
                const cell = document.createElement('div');
                cell.className = i < reisen.length ? 'matrix-cell active' : 'matrix-cell';
                grid.appendChild(cell);
            }
        }

        // --- Logik-Funktionen ---
        function updateVWL() {
            const bip = document.getElementById('bip-value');
            const card = document.getElementById('vpw-card');
            const score = Math.round((reisen.length / 50) * 100);
            bip.innerText = `${score}%`;
            if(score < 30) {
                card.classList.add('alarm-card'); bip.style.color = 'var(--neon-red)';
            } else {
                card.classList.remove('alarm-card'); bip.style.color = 'var(--neon-green)';
            }
        }

        function updateMinimal() {
            document.getElementById('minimal-counter').innerText = itemsCount;
        }

        // --- Interaktive Aktionen ---
        function simulateNewAsset() {
            // 1 rein = Items steigen, VWL-Score sinkt leicht (wegen Schulden)
            itemsCount++;
            updateMinimal();
            if(window.navigator.vibrate) window.navigator.vibrate(200); // Haptik
            alert("⚠️ 1 NEUES ASSET ERKANNT. 2 ENTSORGUNGEN ERFORDERLICH.");
        }

        function simulateRun() {
            // Ein Lauf = 2 Items runter (Minimalismus-Sieg)
            itemsCount -= 2;
            updateMinimal();
            if(window.navigator.vibrate) window.navigator.vibrate([30, 30, 30]); // Haptik
            document.getElementById('matrix-grid').querySelector('.matrix-cell:not(.active)').classList.add('active');
        }

        function resetLab() {
            if(confirm("SYSTEM-RESET STARTEN? ALLE LEISTUNGEN VERLOREN.")) {
                location.reload();
            }
        }

        window.onload = initChaosLab;
    </script>
</body>
</html>
