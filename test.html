<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Passport</title>
    <script src="daten.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5; 
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --header-border: #e2e8f0;
            --btn-bg: #ffffff;
            --btn-border: #e2e8f0;
            --btn-text: #1e293b;
            --passport-green-soft: #e8f2e9; 
            --ink-dark: #1a3a16;
            --border-page: #d1ddd2;
            --text-secondary: #7a8c7b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --header-bg: rgba(15, 23, 42, 0.9);
                --header-text: #f1f5f9;
                --header-border: #1e293b;
                --btn-bg: #1e293b;
                --btn-border: #2d3f55;
                --btn-text: #f1f5f9;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            background: var(--header-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            text-decoration: none; color: var(--btn-text);
        }

        header h1 { color: var(--header-text); font-size: 1.15rem; font-weight: 800; }

        .book-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            height: 100vh;
            padding-top: 100px;
            scrollbar-width: none;
        }
        .book-container::-webkit-scrollbar { display: none; }

        .page {
            flex: 0 0 100vw;
            scroll-snap-align: start;
            display: flex; justify-content: center; padding: 10px;
        }

        .page-inner {
            width: 100%; max-width: 380px; height: 620px;
            background: var(--passport-green-soft);
            border-radius: 15px; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 25px 20px;
            border: 1px solid var(--border-page);
            display: flex; flex-direction: column;
        }

        .page-header {
            text-align: center; font-size: 0.65rem; font-weight: 700;
            color: var(--text-secondary); text-transform: uppercase;
            letter-spacing: 2px; border-bottom: 1px solid var(--border-page);
            padding-bottom: 10px; margin-bottom: 20px;
        }

        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px; flex: 1;
        }

        .stamp-slot { display: flex; align-items: center; justify-content: center; overflow: visible; }

        /* Stamp Base */
        .stamp {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            mix-blend-mode: multiply;
            padding: 12px;
            text-align: center;
            border: 2.5px solid;
            min-width: 110px;
        }

        /* Shape Varianten ohne festes Clipping für bessere Lesbarkeit */
        .stamp-circle { border-radius: 50%; aspect-ratio: 1/1; width: 110px; }
        .stamp-rect { border-radius: 4px; width: 125px; min-height: 85px; }
        .stamp-hex { 
            border-radius: 10px; 
            transform: skewX(-5deg); /* Leichter visueller Twist statt hartem Hexagon-Clip */
            width: 120px; 
        }

        .stamp .land { 
            font-weight: 900; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            line-height: 1.1; 
            max-width: 90px;
            word-wrap: break-word;
        }
        .stamp .jahr { 
            font-size: 1.2rem; 
            font-weight: 900; 
            border-top: 2px solid; 
            border-bottom: 2px solid; 
            margin: 4px 0; 
            padding: 0 8px; 
        }
        .stamp .type { font-size: 0.45rem; letter-spacing: 1.2px; font-weight: 800; opacity: 0.8; }

        .page-footer {
            text-align: center; font-size: 0.7rem; font-weight: 800;
            color: var(--ink-dark); text-transform: uppercase;
            margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border-page);
        }
    </style>
</head>
<body>

    <svg style="display: none;">
        <filter id="soft-bleed">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" />
        </filter>
    </svg>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Passport</h1>
    </header>

    <div class="book-container" id="book-container"></div>

    <script>
        const colors = ['#1e3a8a', '#991b1b', '#064e3b', '#581c87', '#78350f'];
        const shapes = ['circle', 'rect', 'hex'];

        function renderPassport() {
            const container = document.getElementById('book-container');
            const reisenFiltered = MEINE_REISEN.filter(r => r.Land !== "Deutschland");
            
            reisenFiltered.sort((a, b) => (b["erste Einreise"] || 2000) - (a["erste Einreise"] || 2000));

            const stampsPerPage = 6;
            const totalPages = Math.ceil(reisenFiltered.length / stampsPerPage);

            for (let p = 0; p < totalPages; p++) {
                const page = document.createElement('div');
                page.className = 'page';
                const pageInner = document.createElement('div');
                pageInner.className = 'page-inner';
                
                const start = p * stampsPerPage;
                const pageItems = reisenFiltered.slice(start, start + stampsPerPage);

                pageInner.innerHTML = `
                    <div class="page-header">Visa - Seite ${p + 1}</div>
                    <div class="stamp-grid" id="grid-${p}"></div>
                    <div class="page-footer">Fabian Geisbüsch</div>
                `;
                
                page.appendChild(pageInner);
                container.appendChild(page);

                const grid = pageInner.querySelector(`#grid-${p}`);
                pageItems.forEach(reise => {
                    const slot = document.createElement('div');
                    slot.className = 'stamp-slot';
                    slot.appendChild(createStamp(reise));
                    grid.appendChild(slot);
                });
            }
        }

        function createStamp(reise) {
            const stampDiv = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            
            const aktuellesJahr = 2026;
            const reiseJahr = reise["erste Einreise"] || 2026;
            const alter = aktuellesJahr - reiseJahr;

            // Opacity Bodenwert auf 0.6 erhöht für bessere Lesbarkeit
            const opacity = Math.max(0.6, 0.95 - (alter * 0.015)); 
            
            // Filter nur sehr dezent einsetzen
            let inkFilter = alter > 8 ? 'url(#soft-bleed)' : 'none';
            const blur = alter > 15 ? 0.4 : 0;

            stampDiv.className = `stamp stamp-${shape}`;
            stampDiv.style.color = color;
            stampDiv.style.borderColor = color;
            stampDiv.style.opacity = opacity;
            stampDiv.style.filter = `${inkFilter} blur(${blur}px)`;

            const rotation = Math.floor(Math.random() * 12) - 6; 
            stampDiv.style.transform = `rotate(${rotation}deg)`;

            stampDiv.innerHTML = `
                <div class="type">ENTRY</div>
                <div class="land">${reise.Land}</div>
                <div class="jahr">${reiseJahr}</div>
                <div class="type">IMMIGRATION</div>
            `;

            return stampDiv;
        }

        window.onload = renderPassport;
    </script>
</body>
</html>
