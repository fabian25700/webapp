<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fabian</title>
    <script src="daten.js"></script>
    <style>
        :root {
            --accent: #e67e22;
            --accent-soft: rgba(230, 126, 34, 0.1);
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #2d3f55;
                --shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: calc(env(safe-area-inset-top) + 20px) 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .header-title {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* Vereinheitlichter Button-Stil */
        #snake-start, #test-link {
            background: var(--accent-soft);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        #snake-start:active, #test-link:active { transform: scale(0.94); opacity: 0.8; }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 90%;
            max-width: 400px;
            margin: auto;
            z-index: 10;
        }

        .menu-card {
            background: var(--surface);
            height: 85px; 
            padding: 0 20px;
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.12s ease;
        }

        .menu-card:active { transform: scale(0.97); background: var(--bg); }

        .icon { 
            font-size: 1.4rem; 
            width: 48px; height: 48px; 
            flex-shrink: 0;
            background: var(--accent-soft);
            display: flex; align-items: center; justify-content: center;
            border-radius: 14px;
        }
        
        .title-group { flex: 1; display: flex; flex-direction: column; }
        .title { font-weight: 700; color: var(--text-primary); font-size: 1.05rem; }
        .subtitle { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
        .arrow { color: var(--text-secondary); font-size: 0.9rem; opacity: 0.4; }

        #game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: none; }
        #score-display {
            position: fixed; top: 100px; width: 100%; text-align: center;
            font-weight: 900; color: var(--accent); display: none; z-index: 100;
            font-size: 3rem; opacity: 0.2; pointer-events: none;
        }
        #instructions { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        #instructions.visible { display: flex; }
        .instr-box { background: var(--surface); border: 1px solid var(--accent); border-radius: 24px; padding: 30px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .instr-box h2 { font-size: 1.2rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; }
        .instr-box p { font-size: 0.9rem; color: var(--text-secondary); }
    </style>
</head>
<body>

    <header>
        <div class="header-title">Fabian</div>
        <div class="header-actions">
            <a href="test.html" id="test-link">Test</a>
            <button id="snake-start" onclick="toggleGame()">🐍 Game</button>
        </div>
    </header>

    <div id="score-display"><span id="current-score">0</span></div>

    <div class="menu-container" id="main-menu">
        <a href="reise_stats.html" class="menu-card" style="border-left: 4px solid var(--accent);">
            <div class="icon">🌍</div>
            <div class="title-group">
                <span class="title">Reisen</span>
                <span class="subtitle">Statistiken & Planung</span>
            </div>
            <span class="arrow">→</span>
        </a>
        
        <a href="alltag.html" class="menu-card">
            <div class="icon">🏠</div>
            <div class="title-group">
                <span class="title">Alltag</span>
                <span class="subtitle">Organisation & Fokus</span>
            </div>
            <span class="arrow">→</span>
        </a>
    </div>

    <div id="instructions">
        <div class="instr-box" id="instr-content"></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score-display");
        const scoreVal = document.getElementById("current-score");
        const instrEl = document.getElementById("instructions");
        const instrContent = document.getElementById("instr-content");

        let gameActive = false;
        let snake, direction, nextDirection, food;
        let score = 0;
        const GRID = 30;
        const SPEED_START = 100;

        function toggleGame() {
            if (!gameActive) showInstructions();
            else stopGame();
        }

        function showInstructions() {
            instrContent.innerHTML = isTouchDevice 
                ? `<h2>🐍 Snake</h2><p>Links tippen = Links-Drehung<br>Rechts tippen = Rechts-Drehung</p>`
                : `<h2>🐍 Snake</h2><p>Pfeiltasten zum Steuern</p>`;
            instrEl.classList.add("visible");
            setTimeout(() => { instrEl.classList.remove("visible"); startGame(); }, 1800);
        }

        function startGame() {
            gameActive = true;
            canvas.style.display = "block";
            scoreDisplay.style.display = "block";
            document.getElementById("snake-start").innerText = "Stop";
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            score = 0;
            scoreVal.innerText = score;
            const startX = Math.floor(canvas.width / 2 / GRID) * GRID;
            const startY = Math.floor(canvas.height / 2 / GRID) * GRID;
            snake = [{ x: startX, y: startY }];
            direction = { x: GRID, y: 0 };
            nextDirection = { x: GRID, y: 0 };
            spawnFood();
            runLoop();
        }

        function runLoop() {
            if (!gameActive) return;
            draw();
            setTimeout(runLoop, SPEED_START);
        }

        function stopGame() {
            gameActive = false;
            canvas.style.display = "none";
            scoreDisplay.style.display = "none";
            document.getElementById("snake-start").innerText = "🐍 Game";
        }

        function spawnFood() {
            const cols = Math.floor(canvas.width / GRID);
            const rows = Math.floor(canvas.height / GRID);
            food = { x: Math.floor(Math.random() * (cols-2) + 1) * GRID, y: Math.floor(Math.random() * (rows-2) + 1) * GRID, symbol: "📍" };
        }

        function draw() {
            direction = nextDirection;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            if (head.x < 0) head.x = Math.floor((canvas.width-1)/GRID)*GRID;
            if (head.x >= canvas.width) head.x = 0;
            if (head.y < 0) head.y = Math.floor((canvas.height-1)/GRID)*GRID;
            if (head.y >= canvas.height) head.y = 0;
            if (snake.some(s => s.x === head.x && s.y === head.y)) { stopGame(); return; }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) { score++; scoreVal.innerText = score; spawnFood(); }
            else { snake.pop(); }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = window.matchMedia('(prefers-color-scheme: dark)').matches ? "rgba(15,23,42,0.9)" : "rgba(240,242,245,0.9)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `${GRID-5}px sans-serif`;
            ctx.fillText(food.symbol, food.x, food.y + GRID - 5);
            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? "#e67e22" : "rgba(230, 126, 34, 0.6)";
                ctx.beginPath(); ctx.roundRect(s.x + 2, s.y + 2, GRID - 4, GRID - 4, 8); ctx.fill();
            });
        }

        window.addEventListener("keydown", (e) => {
            if (!gameActive) return;
            if (e.key === "ArrowUp" && direction.y === 0) nextDirection = { x: 0, y: -GRID };
            if (e.key === "ArrowDown" && direction.y === 0) nextDirection = { x: 0, y: GRID };
            if (e.key === "ArrowLeft" && direction.x === 0) nextDirection = { x: -GRID, y: 0 };
            if (e.key === "ArrowRight" && direction.x === 0) nextDirection = { x: GRID, y: 0 };
        });

        window.addEventListener("touchstart", (e) => {
            if (!gameActive) return;
            const touchX = e.touches[0].clientX;
            const d = direction;
            if (touchX < window.innerWidth / 2) {
                if (d.x > 0) nextDirection = { x: 0, y: -GRID };
                else if (d.x < 0) nextDirection = { x: 0, y: GRID };
                else if (d.y > 0) nextDirection = { x: GRID, y: 0 };
                else if (d.y < 0) nextDirection = { x: -GRID, y: 0 };
            } else {
                if (d.x > 0) nextDirection = { x: 0, y: GRID };
                else if (d.x < 0) nextDirection = { x: 0, y: -GRID };
                else if (d.y > 0) nextDirection = { x: -GRID, y: 0 };
                else if (d.y < 0) nextDirection = { x: GRID, y: 0 };
            }
        }, { passive: true });
    </script>
</body>
</html>
