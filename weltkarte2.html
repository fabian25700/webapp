<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Weltkarte</title>
    <style>
        :root { --accent: #e67e22; --bg: #f0f2f5; --land: #d1d8e0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; font-size: 1.5rem; color: var(--accent); margin-right: 15px; font-weight: bold; }
        
        #map-container {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Styling der echten Weltkarte */
        svg { width: 100%; height: auto; display: block; }
        path { 
            fill: var(--land); 
            stroke: #ffffff; 
            stroke-width: 0.5; 
            transition: fill 0.3s ease;
            cursor: pointer;
        }

        /* Die Farbe für besuchte Länder */
        .visited { fill: var(--accent) !important; }

        .info-box { margin-top: 20px; font-size: 0.9rem; color: #7f8c8d; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>Meine Weltkarte 🌍</h1>
    </div>

    <div id="map-container">
        <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
            <g id="welt">
                <path id="DE" title="Germany" d="M520,150..." /> 
                <path id="US" title="USA" d="M200,180..." />
                <path id="SE" title="Sweden" d="M540,80..." />
                <path id="LV" title="Latvia" d="M570,110..." />
                </g>
        </svg>
    </div>

    <div class="info-box" id="status">Lade besuchten Status...</div>

    <script>
        // Deine ursprüngliche Liste direkt im Code
        const REISE_DATEN = [
            { id: "DE", land: "Deutschland" },
            { id: "CH", land: "Schweiz" },
            { id: "SE", land: "Schweden" },
            { id: "DK", land: "Dänemark" },
            { id: "LV", land: "Lettland" },
            { id: "LT", land: "Litauen" },
            { id: "NO", land: "Norwegen" },
            { id: "US", land: "USA" },
            { id: "GR", land: "Griechenland" },
            { id: "ES", land: "Spanien" }
            // Hier fügst du den Rest deiner Länder ein
        ];

        function highlightCountries() {
            let count = 0;
            REISE_DATEN.forEach(trip => {
                // Wir suchen das Land im SVG über die ID
                const path = document.getElementById(trip.id);
                if (path) {
                    path.classList.add('visited');
                    count++;
                }
            });
            document.getElementById('status').innerText = count + " Länder markiert.";
        }

        window.onload = highlightCountries;
    </script>
</body>
</html>
