<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --border-light: #f1f5f9;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --text-primary: #f1f5f9;
                --border-light: #253347;
                --shadow: 0 2px 8px rgba(0,0,0,0.4);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--surface);
            padding: calc(env(safe-area-inset-top) + 14px) 16px 12px;
            border-bottom: 1px solid var(--border-light);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .back-btn {
            text-decoration: none;
            font-size: 1.2rem;
            color: var(--text-primary);
            padding: 5px 10px;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-primary);
            flex: 1;
        }

        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }

        /* Stats Overlay unten links */
        .stats-box {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: var(--surface);
            padding: 12px 18px;
            border-radius: 15px;
            z-index: 1000;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .stats-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 700; }
        .stats-val { font-size: 20px; font-weight: 800; color: #2ecc71; }

    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <div class="header-title">Weltkarte</div>
    </header>

    <div id="map"></div>

    <div class="stats-box">
        <div class="stats-label">Erschließung</div>
        <div class="stats-val" id="global-percent">0.0%</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const tileUrl = isDark
            ? 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png'
            : 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png';

        const map = L.map('map', {
            center: [25, 10],
            zoom: 2.5,
            zoomControl: false,
            attributionControl: false
        });

        L.tileLayer(tileUrl).addTo(map);

        // Stats berechnen
        const count = MEINE_REISEN.length;
        document.getElementById('global-percent').innerText = ((count / 195) * 100).toFixed(1) + '%';

        // Länder laden und stabil färben
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function(feature) {
                        const iso = (feature.properties.ISO_A2 || "").toUpperCase();
                        const besucht = MEINE_REISEN.some(r => r.id.toUpperCase() === iso);
                        return {
                            fillColor: besucht ? '#2ecc71' : (isDark ? '#222' : '#ddd'),
                            fillOpacity: besucht ? 0.7 : 0.2,
                            weight: 1,
                            color: isDark ? '#000' : '#fff'
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        const iso = (feature.properties.ISO_A2 || "").toUpperCase();
                        const info = MEINE_REISEN.find(r => r.id.toUpperCase() === iso);
                        if (info) {
                            layer.bindPopup(`<b>${info.flagge} ${info.Land}</b><br>${info.Übernachtungen} Nächte`);
                        }
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
