<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weltkarte | Expansion</title>
    <script src="daten.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --apple-blue: #0071e3;
            --glass: rgba(255, 255, 255, 0.75);
            --bg: #f5f5f7;
            --text: #1d1d1f;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass: rgba(28, 28, 30, 0.85);
                --bg: #000000;
                --text: #f5f5f7;
            }
        }

        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); font-family: -apple-system, sans-serif; overflow: hidden; }

        #map { width: 100%; height: 100%; z-index: 1; background: var(--bg); }

        /* Floating UI Elements */
        .glass-ui {
            position: fixed; z-index: 1000;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: var(--glass); border-radius: 18px;
            color: var(--text); border: 1px solid rgba(255,255,255,0.1);
        }

        /* Erschließungsgrad unten links */
        .stats-overlay {
            bottom: 110px; left: 20px;
            padding: 12px 18px;
        }

        /* Slider unten */
        .slider-container {
            bottom: 30px; left: 20px; right: 20px;
            padding: 15px 20px; display: flex; align-items: center; gap: 15px;
        }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #888; margin-bottom: 2px; }
        .val { font-size: 22px; font-weight: 700; color: var(--apple-blue); }

        /* Custom Slider */
        input[type=range] {
            flex: 1; -webkit-appearance: none; background: rgba(120,120,120,0.2);
            height: 4px; border-radius: 2px; cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 22px; width: 22px;
            border-radius: 50%; background: var(--apple-blue); border: 3px solid #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .year-indicator { font-size: 14px; font-weight: 700; min-width: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="stats-overlay glass-ui">
        <div class="label">Erschließung</div>
        <div class="val" id="global-percent">0.0%</div>
    </div>

    <div class="slider-container glass-ui">
        <div class="year-indicator" id="year-display">2026</div>
        <input type="range" id="year-slider" min="2020" max="2026" step="1" value="2026">
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const tileUrl = isDark 
            ? 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png'
            : 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png';

        const map = L.map('map', { center: [30, 10], zoom: 2.5, zoomControl: false, attributionControl: false });
        L.tileLayer(tileUrl).addTo(map);

        let geoDataLayer;
        let currentYear = 2026;

        // Choroplethen-Skalierung
        const nightsArray = MEINE_REISEN.map(r => r.Übernachtungen);
        const maxNights = Math.max(...nightsArray);
        const minNights = Math.min(...nightsArray);

        function getColor(nights) {
            if (!nights) return 'transparent';
            const range = maxNights - minNights;
            if (nights >= minNights + range * 0.8) return '#1a7a3a';
            if (nights >= minNights + range * 0.6) return '#2ecc71';
            if (nights >= minNights + range * 0.4) return '#58d68d';
            if (nights >= minNights + range * 0.2) return '#82e0aa';
            return '#abebc6';
        }

        function style(feature) {
            const countryId = (feature.properties.ISO_A2 || "").toUpperCase();
            const country = MEINE_REISEN.find(r => r.id.toUpperCase() === countryId);
            
            // Logik: Land nur anzeigen, wenn Einreisejahr <= gewähltes Jahr
            const isVisible = country && (country["erste Einreise"] || 2020) <= currentYear;

            return {
                fillColor: isVisible ? getColor(country.Übernachtungen) : (isDark ? '#1a1a1a' : '#e5e5e5'),
                fillOpacity: isVisible ? 0.85 : 0.4,
                weight: 0.6,
                color: isDark ? '#000' : '#fff'
            };
        }

        function updateStats() {
            const filtered = MEINE_REISEN.filter(r => (r["erste Einreise"] || 2020) <= currentYear);
            const percent = ((filtered.length / 195) * 100).toFixed(1);
            document.getElementById('global-percent').innerText = percent + '%';
        }

        // GeoJSON laden
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                geoDataLayer = L.geoJSON(data, {
                    style: style,
                    onEachFeature: (feature, layer) => {
                        layer.on('click', (e) => {
                            const countryId = (feature.properties.ISO_A2 || "").toUpperCase();
                            const info = MEINE_REISEN.find(r => r.id.toUpperCase() === countryId);
                            if (info && (info["erste Einreise"] || 2020) <= currentYear) {
                                L.popup()
                                    .setLatLng(e.latlng)
                                    .setContent(`<b>${info.flagge} ${info.Land}</b><br>${info.Übernachtungen} Nächte`)
                                    .openOn(map);
                            }
                        });
                    }
                }).addTo(map);
                updateStats();
            });

        // Slider-Logik
        const slider = document.getElementById('year-slider');
        const yearDisplay = document.getElementById('year-display');

        slider.addEventListener('input', (e) => {
            currentYear = parseInt(e.target.value);
            yearDisplay.innerText = currentYear;
            
            // Layer-Style aktualisieren ohne neu zu laden
            if (geoDataLayer) {
                geoDataLayer.setStyle(style);
            }
            updateStats();
        });
    </script>
</body>
</html>
