<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, sans-serif; background: #f8fafc; }
        header { background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; z-index: 1000; display: flex; align-items: center; }
        #map { flex: 1; width: 100%; background: #aad3df; }
        .back-link { text-decoration: none; font-size: 1.5rem; color: #2ecc71; font-weight: bold; margin-right: 15px; }
        h1 { margin: 0; font-size: 1.1rem; color: #1e293b; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-link">←</a>
        <h1>Reisekarte (Besucht vs. Offen)</h1>
    </header>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([30, 10], 2); 
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        function findeLand(feature) {
            const p = feature.properties;
            const geoID = (p.ISO_A2 || p.iso_a2 || p.ISO_A2_EH || feature.id || "").toString().toUpperCase().trim();
            const geoName = (p.name || p.ADMIN || p.NAME || "").toString().toLowerCase().trim();

            return MEINE_REISEN.find(r => {
                const meinID = r.id.toUpperCase().trim();
                const meinNameEn = r.name_en.toLowerCase().trim();
                return meinID === geoID || meinNameEn === geoName;
            });
        }

        function style(feature) {
            const gefunden = findeLand(feature);
            return {
                fillColor: gefunden ? '#2ecc71' : '#ff4d4d',
                weight: 1,
                color: '#ffffff',
                opacity: 1,
                fillOpacity: gefunden ? 0.8 : 0.3
            };
        }

        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: style,
                    onEachFeature: (f, l) => {
                        const info = findeLand(f);
                        if (info) {
                            l.bindPopup(`<b>${info.Land}</b><br>🏨 ${info.Übernachtungen} Nächte<br>🏃 ${info.km_gejoggt} km`);
                        } else {
                            const name = f.properties.name || f.properties.ADMIN || "Unbekannt";
                            l.bindPopup(`<b>${name}</b><br>Noch nicht besucht`);
                        }
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
