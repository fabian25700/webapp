<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fabian | Global Expansion</title>
    <script src="daten.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-green: #34c759;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-dark: rgba(28, 28, 30, 0.7);
            --bg: #f5f5f7;
            --text: #1d1d1f;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass: rgba(28, 28, 30, 0.8);
                --bg: #000000;
                --text: #f5f5f7;
            }
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: -apple-system, sans-serif; overflow: hidden; }

        #map { width: 100%; height: 100%; z-index: 1; }

        /* Floating UI Elements */
        .glass-ui {
            position: fixed; z-index: 1000;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            color: var(--text);
        }

        header {
            top: 20px; left: 20px; right: 20px;
            padding: 15px 25px; display: flex; align-items: center; justify-content: space-between;
        }

        .stats-overlay {
            bottom: 100px; left: 20px;
            padding: 20px; width: 220px;
        }

        .slider-container {
            bottom: 30px; left: 20px; right: 20px;
            padding: 15px 25px; display: flex; align-items: center; gap: 20px;
        }

        /* Typography */
        .title { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.2px; }
        .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 5px; }
        .val { font-size: 24px; font-weight: 700; color: var(--apple-blue); }

        /* Slider Styling */
        input[type=range] {
            flex: 1; -webkit-appearance: none; background: rgba(120,120,120,0.2);
            height: 4px; border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px;
            border-radius: 50%; background: var(--apple-blue); cursor: pointer;
        }

        .back-btn { text-decoration: none; color: var(--text); font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header class="glass-ui">
        <a href="reise_stats.html" class="back-btn">← Zurück</a>
        <div class="title">EXPANSION MAP</div>
        <div id="year-display" style="font-weight: 700; color: var(--apple-blue);">2026</div>
    </header>

    <div class="stats-overlay glass-ui">
        <div class="label">Erschließungsgrad</div>
        <div class="val" id="global-percent">0.0%</div>
        <div style="font-size: 12px; margin-top: 10px; opacity: 0.8;" id="total-nights">0 Nächte weltweit</div>
    </div>

    <div class="slider-container glass-ui">
        <span style="font-size: 12px; font-weight: 600;">2023</span>
        <input type="range" id="year-slider" min="2023" max="2026" step="1" value="2026">
        <span style="font-size: 12px; font-weight: 600;">AKTUELL</span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const tileUrl = isDark 
            ? 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png'
            : 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png';

        const map = L.map('map', { center: [20, 10], zoom: 3, zoomControl: false, attributionControl: false });
        L.tileLayer(tileUrl).addTo(map);

        let geoDataLayer;
        let currentYear = 2026;

        // --- Logik: Choroplethen-Skalierung ---
        const nightsArray = MEINE_REISEN.map(r => r.Übernachtungen);
        const maxNights = Math.max(...nightsArray);
        const minNights = Math.min(...nightsArray);

        function getColor(nights) {
            if (!nights) return 'transparent';
            const range = maxNights - minNights;
            // 5 Stufen basierend auf deinem Max/Min
            if (nights >= minNights + range * 0.8) return '#1a7a3a'; // 100%
            if (nights >= minNights + range * 0.6) return '#2ecc71'; // 80%
            if (nights >= minNights + range * 0.4) return '#58d68d'; // 60%
            if (nights >= minNights + range * 0.2) return '#82e0aa'; // 40%
            return '#abebc6'; // 20%
        }

        function style(feature) {
            const country = MEINE_REISEN.find(r => 
                (r.id.toUpperCase() === (feature.properties.ISO_A2 || "").toUpperCase()) &&
                (r["erste Einreise"] || 2023) <= currentYear
            );

            return {
                fillColor: country ? getColor(country.Übernachtungen) : (isDark ? '#111' : '#ddd'),
                fillOpacity: country ? 0.85 : 0.3,
                weight: 0.5,
                color: isDark ? '#000' : '#fff'
            };
        }

        // --- Daten-Update ---
        function updateMap() {
            if (geoDataLayer) map.removeLayer(geoDataLayer);

            fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
                .then(res => res.json())
                .then(data => {
                    geoDataLayer = L.geoJSON(data, {
                        style: style,
                        onEachFeature: (feature, layer) => {
                            const info = MEINE_REISEN.find(r => 
                                r.id.toUpperCase() === (feature.properties.ISO_A2 || "").toUpperCase() &&
                                (r["erste Einreise"] || 2023) <= currentYear
                            );
                            if (info) {
                                layer.bindPopup(`<b>${info.flagge} ${info.Land}</b><br>${info.Übernachtungen} Nächte<br>Eintritt: ${info["erste Einreise"]}`);
                            }
                        }
                    }).addTo(map);

                    // Update UI Stats
                    const visibleCountries = MEINE_REISEN.filter(r => (r["erste Einreise"] || 2023) <= currentYear);
                    const totalNights = visibleCountries.reduce((sum, r) => sum + r.Übernachtungen, 0);
                    document.getElementById('global-percent').innerText = ((visibleCountries.length / 195) * 100).toFixed(1) + '%';
                    document.getElementById('total-nights').innerText = `${totalNights} Nächte im Zeitraum`;
                });
        }

        // --- Event Listener ---
        const slider = document.getElementById('year-slider');
        const yearDisplay = document.getElementById('year-display');

        slider.addEventListener('input', (e) => {
            currentYear = parseInt(e.target.value);
            yearDisplay.innerText = currentYear;
            updateMap();
        });

        window.onload = updateMap;
    </script>
</body>
</html>
