<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expansion Map | Analytics</title>
    <script src="daten.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --apple-blue: #0071e3;
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --glass: rgba(255, 255, 255, 0.85);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #000000; --text: #f5f5f7; --glass: rgba(28, 28, 30, 0.9); }
        }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 1; background: var(--bg); }

        .ui-element {
            position: fixed; z-index: 1000;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: var(--glass); border-radius: 18px; padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); color: var(--text);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stats-card { bottom: 110px; left: 20px; min-width: 140px; }
        .slider-card { bottom: 30px; left: 20px; right: 20px; display: flex; align-items: center; gap: 15px; }
        
        header { position: fixed; top: 0; width: 100%; padding: 15px; z-index: 1000; display: flex; align-items: center; pointer-events: none; }
        .back-btn { background: var(--glass); padding: 8px 15px; border-radius: 12px; text-decoration: none; color: var(--text); font-weight: 600; pointer-events: auto; }
        
        input[type=range] { flex: 1; -webkit-appearance: none; background: rgba(120,120,120,0.3); height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--apple-blue); border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <div id="year-label" style="margin-left: auto; font-weight: 800; color: var(--apple-blue); background: var(--glass); padding: 8px 20px; border-radius: 12px; pointer-events: auto;">2026</div>
    </header>

    <div id="map"></div>

    <div class="stats-card ui-element">
        <div style="font-size: 10px; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px;">Erschließungsgrad</div>
        <div id="global-percent" style="font-size: 26px; font-weight: 800; color: var(--apple-blue);">0.0%</div>
    </div>

    <div class="slider-card ui-element">
        <span style="font-size: 12px; font-weight: 700;">2000</span>
        <input type="range" id="year-slider" min="2000" max="2026" value="2026" step="1">
        <span style="font-size: 12px; font-weight: 700;">HEUTE</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        // Apple Maps Style (Grau/Blau/Weiß)
        const tileUrl = isDark 
            ? 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png' 
            : 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png';

        const map = L.map('map', { 
            center: [25, 10], 
            zoom: 2.5, 
            zoomControl: false, 
            attributionControl: false,
            maxBounds: [[-90, -180], [90, 180]]
        });
        
        L.tileLayer(tileUrl).addTo(map);

        let geoLayer;
        let currentYear = 2026;

        // --- Logik für "Saftiges Grün" (Top 20%) ---
        function getFarbe(n) {
            const nights = MEINE_REISEN.map(r => r.Übernachtungen);
            const maxN = Math.max(...nights);
            const minN = Math.min(...nights);
            const range = maxN - minN;
            
            if (n >= minN + range * 0.8) return '#1a7a3a'; // Top-Tier (z.B. Deutschland)
            if (n >= minN + range * 0.6) return '#2ecc71';
            if (n >= minN + range * 0.4) return '#58d68d';
            if (n >= minN + range * 0.2) return '#82e0aa';
            return '#abebc6'; // Single Nights
        }

        function style(feature) {
            const iso = (feature.properties.ISO_A2 || feature.properties.iso_a2 || "").toUpperCase();
            const data = MEINE_REISEN.find(r => r.id.toUpperCase() === iso);
            
            // Nur anzeigen, wenn Einreisejahr <= gewähltes Slider-Jahr
            const isVisible = data && data["erste Einreise"] <= currentYear;
            
            return {
                fillColor: isVisible ? getFarbe(data.Übernachtungen) : (isDark ? '#1a1a1e' : '#e0e0e2'),
                fillOpacity: isVisible ? 0.9 : 0.4,
                weight: 0.8,
                color: isDark ? '#000' : '#fff'
            };
        }

        function updateUI() {
            if (geoLayer) geoLayer.setStyle(style);
            
            const visibleCount = MEINE_REISEN.filter(r => r["erste Einreise"] <= currentYear).length;
            const percent = ((visibleCount / 195) * 100).toFixed(1);
            
            document.getElementById('global-percent').innerText = `${percent}%`;
            document.getElementById('year-label').innerText = currentYear;
        }

        // --- GeoData laden ---
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                geoLayer = L.geoJSON(data, {
                    style: style,
                    onEachFeature: (f, l) => {
                        l.on('click', (e) => {
                            const iso = (f.properties.ISO_A2 || f.properties.iso_a2 || "").toUpperCase();
                            const d = MEINE_REISEN.find(r => r.id.toUpperCase() === iso);
                            
                            if (d && d["erste Einreise"] <= currentYear) {
                                L.popup()
                                    .setLatLng(e.latlng)
                                    .setContent(`
                                        <div style="font-family:-apple-system; padding:5px;">
                                            <span style="font-size:18px;">${d.flagge}</span> <b>${d.Land}</b><br>
                                            <small style="color:#666;">Seit ${d["erste Einreise"]}</small><br>
                                            <b>${d.Übernachtungen}</b> Nächte
                                        </div>
                                    `)
                                    .openOn(map);
                            }
                        });
                    }
                }).addTo(map);
                updateUI();
            });

        // Slider Event
        document.getElementById('year-slider').addEventListener('input', (e) => {
            currentYear = parseInt(e.target.value);
            updateUI();
        });
    </script>
</body>
</html>
