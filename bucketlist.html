<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Bucketlist</title>
    <style>
        :root {
            --accent: #e67e22;
            --accent-soft: rgba(230, 126, 34, 0.1);
            --success: #27ae60;
            --success-soft: rgba(39, 174, 96, 0.1);
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #2d3f55;
                --border-light: #253347;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg);
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            border-bottom: 1px solid var(--border-light);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }

        .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        
        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--surface); border: 1px solid var(--border);
            text-decoration: none; color: var(--text-primary); box-shadow: var(--shadow);
        }

        header h1 { font-size: 1.15rem; font-weight: 800; flex: 1; }

        .progress-container { background: var(--border-light); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
        .progress-bar { background: var(--success); height: 100%; transition: width 0.5s ease; }
        .stats-text { font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

        main { padding: 16px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        /* Category Toggle Section */
        .category-group { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; box-shadow: var(--shadow); }
        
        .category-header {
            padding: 16px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; user-select: none; transition: background 0.2s;
        }
        .category-header:active { background: var(--border-light); }

        .category-title { font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 10px; }
        .category-icon { width: 28px; height: 28px; background: var(--accent-soft); color: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        
        .arrow { font-size: 0.8rem; color: var(--text-tertiary); transition: transform 0.3s ease; }
        .category-group.open .arrow { transform: rotate(180deg); }

        .category-content { display: none; padding: 0 16px 16px; flex-direction: column; gap: 8px; border-top: 1px solid var(--border-light); padding-top: 16px; }
        .category-group.open .category-content { display: flex; }

        /* Bucket Card */
        .bucket-card {
            background: var(--bg); border-radius: 12px; border: 1px solid var(--border);
            padding: 12px 14px; display: flex; align-items: center; gap: 12px;
        }
        .bucket-card.done { opacity: 0.5; border-style: dashed; }

        .status-circle {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .done .status-circle { background: var(--success); border-color: var(--success); }
        .status-circle::after { content: '✓'; color: white; font-size: 12px; display: none; }
        .done .status-circle::after { display: block; }

        .location-name { font-weight: 600; font-size: 0.95rem; flex: 1; }
        
        .status-tag { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; }
        .tag-ja { background: var(--success-soft); color: var(--success); }
        .tag-nein { background: var(--accent-soft); color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Bucketlist</h1>
        <div class="stats-text" id="stats-summary">0 / 0</div>
    </div>
    <div class="progress-container"><div class="progress-bar" id="progress-bar" style="width: 0%"></div></div>
</header>

<main id="category-container"></main>

<script>
    const BUCKET_DATA = [
        // Länder
        { ort: "Schweiz", status: "ja", cat: "Länder" },
        { ort: "Malediven", status: "nein", cat: "Länder" },
        { ort: "Monaco", status: "nein", cat: "Länder" },
        { ort: "Karibik", status: "nein", cat: "Länder" },
        
        // Städte
        { ort: "New York", status: "ja", cat: "Städte" },
        { ort: "Wien", status: "ja", cat: "Städte" },
        { ort: "Dubai", status: "ja", cat: "Städte" },
        { ort: "Stockholm", status: "ja", cat: "Städte" },
        { ort: "Washington DC", status: "ja", cat: "Städte" },
        { ort: "Oxford", status: "nein", cat: "Städte" },
        { ort: "Venedig", status: "nein", cat: "Städte" },
        { ort: "Prag", status: "nein", cat: "Städte" },
        { ort: "Athen", status: "nein", cat: "Städte" },
        { ort: "Las Vegas", status: "nein", cat: "Städte" },
        { ort: "Miami", status: "nein", cat: "Städte" },
        { ort: "Hawaii", status: "nein", cat: "Städte" },
        { ort: "Mykonos", status: "nein", cat: "Städte" },
        { ort: "Sylt", status: "nein", cat: "Städte" },
        { ort: "Eine Planstadt", status: "nein", cat: "Städte" },
        { ort: "Eine Lagunenstadt", status: "nein", cat: "Städte" },
        
        // Hotels
        { ort: "Vier Jahreszeiten Hamburg", status: "nein", cat: "Hotels" },
        { ort: "Hotel Sacher", status: "nein", cat: "Hotels" },
        { ort: "Burj Al Arab", status: "nein", cat: "Hotels" },
        { ort: "Ceasars Palace", status: "nein", cat: "Hotels" },
        
        // Attraktionen
        { ort: "Venice Orient Express", status: "nein", cat: "Attraktionen" },
        { ort: "Ein Klischee Strand", status: "nein", cat: "Attraktionen" }
    ];

    const icons = {
        "Länder": "🌍",
        "Städte": "🏙️",
        "Hotels": "🏨",
        "Attraktionen": "✨"
    };

    function renderCategories() {
        const container = document.getElementById('category-container');
        container.innerHTML = '';
        
        const categories = ["Länder", "Städte", "Hotels", "Attraktionen"];

        categories.forEach(catName => {
            const group = document.createElement('div');
            group.className = 'category-group';
            
            // Filter data for this category and sort: 'nein' first
            const catItems = BUCKET_DATA
                .filter(i => i.cat === catName)
                .sort((a, b) => (a.status === 'ja' ? 1 : -1));

            const doneCount = catItems.filter(i => i.status === 'ja').length;

            group.innerHTML = `
                <div class="category-header" onclick="this.parentElement.classList.toggle('open')">
                    <div class="category-title">
                        <div class="category-icon">${icons[catName]}</div>
                        ${catName}
                        <span style="font-size: 0.65rem; color: var(--text-secondary); opacity: 0.7">(${doneCount}/${catItems.length})</span>
                    </div>
                    <div class="arrow">▼</div>
                </div>
                <div class="category-content">
                    ${catItems.map(item => `
                        <div class="bucket-card ${item.status === 'ja' ? 'done' : ''}">
                            <div class="status-circle"></div>
                            <div class="location-name">${item.ort}</div>
                            <div class="status-tag tag-${item.status}">${item.status === 'ja' ? 'Done' : 'Open'}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(group);
        });

        updateProgress();
    }

    function updateProgress() {
        const total = BUCKET_DATA.length;
        const done = BUCKET_DATA.filter(i => i.status === 'ja').length;
        const percent = Math.round((done / total) * 100);
        
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('stats-summary').textContent = `${done} / ${total} Ziele`;
    }

    window.onload = renderCategories;
</script>

</body>
</html>
