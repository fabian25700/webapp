<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Departures</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --header-bg: rgba(15, 23, 42, 0.9);
            --header-text: #fdb813; /* Flughafen-Gelb */
            --header-border: #1e293b;
            --board-bg: #1a1a1a;
            --flap-bg: #222;
            --text-white: #ffffff;
            --text-yellow: #fdb813;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--header-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }

        header h1 { 
            color: var(--header-text); 
            font-size: 1.15rem; 
            font-weight: 800; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: #1e293b; border: 1px solid #2d3f55;
            text-decoration: none; color: #f1f5f9;
        }

        /* Board Styling */
        .board-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #departure-board {
            background-color: var(--board-bg);
            padding: 25px;
            border: 6px solid #333;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: fit-content;
        }

        .board-header {
            display: grid;
            grid-template-columns: 100px 80px 160px 160px 140px;
            gap: 8px;
            margin-bottom: 15px;
            color: #555;
            font-size: 11px;
            font-family: "SF Pro Text", sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .flight-row {
            display: grid;
            grid-template-columns: 100px 80px 160px 160px 140px;
            gap: 8px;
            margin-bottom: 6px;
        }

        .flap-group { display: flex; gap: 2px; }

        .flap {
            width: 18px;
            height: 28px;
            background-color: var(--flap-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            border: 1px solid #000;
        }

        /* Standard Textfarbe Weiß */
        .flap { color: var(--text-white); }
        /* Ankunftsort (4. Gruppe) Textfarbe Gelb */
        .flight-row div:nth-child(4) .flap { color: var(--text-yellow); }

        .flap::after {
            content: ''; position: absolute; top: 50%; left: 0;
            width: 100%; height: 1px; background: rgba(0,0,0,0.6);
            z-index: 2;
        }

        @keyframes flip {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-360deg); }
        }

        .flipping { animation: flip 0.1s ease-in-out infinite; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">←</a>
        <h1>Departures ✈</h1>
    </header>

    <div class="board-container">
        <div id="departure-board">
            <div class="board-header">
                <div>Datum</div>
                <div>Flug</div>
                <div>Abflugort</div>
                <div>Ankunftort</div>
                <div>Airline</div>
            </div>
            <div id="rows-container"></div>
        </div>
    </div>

<script>
    const CHARS = " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789:.";
    
    // Deine Reise-Historie (Beispielwerte)
    const travelData = [
        { date: "15.04.26", flight: "EK046", from: "DUSSELDORF", to: "DUBAI", airline: "EMIRATES" },
        { date: "10.06.26", flight: "SK638", from: "DUSSELDORF", to: "STOCKHOLM", airline: "SAS" },
        { date: "05.07.26", flight: "UA122", from: "FRANKFURT", to: "NEW YORK", airline: "UNITED" },
        { date: "12.08.26", flight: "MK011", from: "PARIS", to: "MAURITIUS", airline: "AIR MAURIT" },
        { date: "20.09.26", flight: "LH184", from: "COLOGNE", to: "COPENHAGEN", airline: "LUFTHANSA" }
    ];

    function createFlapGroup(length) {
        const group = document.createElement('div');
        group.className = 'flap-group';
        for (let i = 0; i < length; i++) {
            const flap = document.createElement('div');
            flap.className = 'flap';
            flap.textContent = ' ';
            group.appendChild(flap);
        }
        return group;
    }

    function initBoard() {
        const container = document.getElementById('rows-container');
        travelData.forEach(() => {
            const row = document.createElement('div');
            row.className = 'flight-row';
            row.appendChild(createFlapGroup(8));  // Datum
            row.appendChild(createFlapGroup(6));  // Flug
            row.appendChild(createFlapGroup(12)); // Abflugort
            row.appendChild(createFlapGroup(12)); // Ankunftort
            row.appendChild(createFlapGroup(10)); // Airline
            container.appendChild(row);
        });
    }

    async function animateFlap(flap, targetChar) {
        let currentIndex = 0;
        flap.classList.add('flipping');
        return new Promise(resolve => {
            const interval = setInterval(() => {
                const char = CHARS[currentIndex];
                flap.textContent = char;
                if (char === targetChar) {
                    clearInterval(interval);
                    flap.classList.remove('flipping');
                    resolve();
                }
                currentIndex = (currentIndex + 1) % CHARS.length;
            }, 30);
        });
    }

    async function updateRow(rowIndex, data) {
        const row = document.getElementsByClassName('flight-row')[rowIndex];
        const groups = row.getElementsByClassName('flap-group');
        const values = [
            data.date.padEnd(8),
            data.flight.padEnd(6),
            data.from.padEnd(12),
            data.to.padEnd(12),
            data.airline.padEnd(10)
        ];

        for (let g = 0; g < groups.length; g++) {
            const flaps = groups[g].getElementsByClassName('flap');
            const targetStr = values[g].toUpperCase();
            for (let f = 0; f < flaps.length; f++) {
                animateFlap(flaps[f], targetStr[f]);
                await new Promise(r => setTimeout(r, 20));
            }
        }
    }

    initBoard();
    setTimeout(() => {
        travelData.forEach((data, index) => {
            setTimeout(() => updateRow(index, data), index * 400);
        });
    }, 800);
</script>

</body>
</html>
