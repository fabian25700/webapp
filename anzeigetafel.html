<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Departures</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --header-bg: rgba(240, 242, 245, 0.9);
            --header-text: #1e293b;
            --header-border: #e2e8f0;
            --btn-bg: #ffffff;
            --btn-border: #e2e8f0;
            --btn-text: #1e293b;
            --board-bg: #1a1a1a;
            --flap-bg: #222;
            --text-white: #ffffff;
            --text-yellow: #fdb813;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --header-bg: rgba(15, 23, 42, 0.9);
                --header-text: #f1f5f9;
                --header-border: #1e293b;
                --btn-bg: #1e293b;
                --btn-border: #2d3f55;
                --btn-text: #f1f5f9;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
            display: flex; align-items: center; gap: 12px;
            background: var(--header-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }

        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            text-decoration: none; color: var(--btn-text);
        }

        header h1 { color: var(--header-text); font-size: 1.15rem; font-weight: 800; }

        .content-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 10px 20px;
        }

        #departure-board {
            background-color: var(--board-bg);
            padding: 30px 20px;
            border: 8px solid #333;
            border-radius: 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 850px;
        }

        .board-title {
            color: var(--text-yellow);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
            padding-left: 5px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .board-header {
            display: grid;
            grid-template-columns: 85px 75px 1fr 1fr 120px;
            gap: 8px;
            margin-bottom: 12px;
            color: #555;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            padding: 0 5px;
        }

        .flight-row {
            display: grid;
            grid-template-columns: 85px 75px 1fr 1fr 120px;
            gap: 8px;
            margin-bottom: 6px;
        }

        .flap-group { display: flex; gap: 2px; }

        .flap {
            width: 17px;
            height: 26px;
            background-color: var(--flap-bg);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            border: 1px solid #000;
        }

        /* Ankunftsort (4. Spalte) in Gelb */
        .flight-row div:nth-child(4) .flap {
            color: var(--text-yellow);
        }

        .flap::after {
            content: ''; position: absolute; top: 50%; left: 0;
            width: 100%; height: 1px; background: rgba(0,0,0,0.6);
            z-index: 2;
        }

        @keyframes flip {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-360deg); }
        }

        .flipping { animation: flip 0.1s ease-in-out infinite; }
    </style>
</head>
<body>

    <header>
        <a href="reise_stats.html" class="back-btn">←</a>
        <h1>Departures</h1>
    </header>

    <div class="content-container">
        <div id="departure-board">
            <div class="board-title">
                DEPARTURES ✈
            </div>
            
            <div class="board-header">
                <div>Datum</div>
                <div>Flug</div>
                <div>Abflug</div>
                <div>Ankunft</div>
                <div>Airline</div>
            </div>
            <div id="rows-container"></div>
        </div>
    </div>

<script>
    const CHARS = " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789:.";
    
    const travelData = [
        { date: "15.04.26", flight: "EK046", from: "DUS", to: "DUBAI", airline: "EMIRATES" },
        { date: "10.06.26", flight: "SK638", from: "DUS", to: "STOCKHOLM", airline: "SAS" },
        { date: "05.07.26", flight: "UA122", from: "FRA", to: "NEW YORK", airline: "UNITED" },
        { date: "12.08.26", flight: "MK011", from: "CDG", to: "MAURITIUS", airline: "AIR MAURIT" },
        { date: "20.09.26", flight: "LH184", from: "CGN", to: "COPENHAGEN", airline: "LUFTHANSA" }
    ];

    function createFlapGroup(length) {
        const group = document.createElement('div');
        group.className = 'flap-group';
        for (let i = 0; i < length; i++) {
            const flap = document.createElement('div');
            flap.className = 'flap';
            flap.textContent = ' ';
            group.appendChild(flap);
        }
        return group;
    }

    function initBoard() {
        const container = document.getElementById('rows-container');
        travelData.forEach(() => {
            const row = document.createElement('div');
            row.className = 'flight-row';
            row.appendChild(createFlapGroup(8));  // Datum
            row.appendChild(createFlapGroup(6));  // Flug
            row.appendChild(createFlapGroup(10)); // Abflug
            row.appendChild(createFlapGroup(10)); // Ankunft
            row.appendChild(createFlapGroup(10)); // Airline
            container.appendChild(row);
        });
    }

    async function animateFlap(flap, targetChar) {
        let currentIndex = 0;
        flap.classList.add('flipping');
        return new Promise(resolve => {
            const interval = setInterval(() => {
                const char = CHARS[currentIndex];
                flap.textContent = char;
                if (char === targetChar) {
                    clearInterval(interval);
                    flap.classList.remove('flipping');
                    resolve();
                }
                currentIndex = (currentIndex + 1) % CHARS.length;
            }, 30);
        });
    }

    async function updateRow(rowIndex, data) {
        const row = document.getElementsByClassName('flight-row')[rowIndex];
        const groups = row.getElementsByClassName('flap-group');
        const values = [
            data.date.padEnd(8),
            data.flight.padEnd(6),
            data.from.padEnd(10),
            data.to.padEnd(10),
            data.airline.padEnd(10)
        ];

        for (let g = 0; g < groups.length; g++) {
            const flaps = groups[g].getElementsByClassName('flap');
            const targetStr = values[g].toUpperCase();
            for (let f = 0; f < flaps.length; f++) {
                animateFlap(flaps[f], targetStr[f]);
                await new Promise(r => setTimeout(r, 20));
            }
        }
    }

    initBoard();
    setTimeout(() => {
        travelData.forEach((data, index) => {
            setTimeout(() => updateRow(index, data), index * 400);
        });
    }, 800);
</script>

</body>
</html>
