<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sticker Vorschau</title>
    <style>
        body { background: #e2e8f0; font-family: sans-serif; padding: 50px; display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; }
        .sticker-wrap { display: flex; flex-direction: column; align-items: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .sticker-render {
            /* Das CSS aus der sticker.js wird hier reingeladen */
            display: flex;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }
        .label { margin-top: 15px; font-weight: bold; color: #64748b; }
    </style>
</head>
<body>

    <script src="sticker.js"></script>

    <script>
        if (typeof stickerDaten !== 'undefined') {
            stickerDaten.forEach(data => {
                const wrap = document.createElement('div');
                wrap.className = 'sticker-wrap';

                const sticker = document.createElement('div');
                sticker.className = 'sticker-render';
                sticker.innerText = data.stadt;
                
                // Größe festlegen
                sticker.style.width = "150px";
                sticker.style.height = "150px";
                
                // Styles aus der sticker.js anwenden
                if (data.style) Object.assign(sticker.style, data.style);

                const label = document.createElement('div');
                label.className = 'label';
                label.innerText = data.stadt + " (" + data.land + ")";

                wrap.appendChild(sticker);
                wrap.appendChild(label);
                document.body.appendChild(wrap);
            });
        } else {
            document.body.innerHTML = "<h1>Fehler: sticker.js nicht gefunden!</h1>";
        }
    </script>
</body>
</html>
