<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <style>
        :root { --accent: #e67e22; --bg: #f0f2f5; --land: #d1d8e0; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; font-size: 1.5rem; color: var(--accent); margin-right: 15px; }
        #map-box { background: white; padding: 10px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; }
        svg { width: 100%; height: auto; }
        path { fill: var(--land); stroke: #fff; stroke-width: 0.5; }
        .visited { fill: var(--accent) !important; }
        .info { margin-top: 15px; font-size: 0.8rem; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="header"><a href="index.html" class="back-btn">←</a><h1>Weltkarte</h1></div>
    <div id="map-box">
        <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
            <path id="DE" title="Deutschland" d="M520,120 l10,0 l0,10 l-10,0 z" />
            <path id="CH" title="Schweiz" d="M515,135 l5,0 l0,5 l-5,0 z" />
            <path id="ES" title="Spanien" d="M480,160 l15,0 l0,15 l-15,0 z" />
            <path id="US" title="USA" d="M150,140 l60,0 l0,40 l-60,0 z" />
            <text x="500" y="250" font-size="20" fill="#ccc">SVG Karte wird geladen...</text>
        </svg>
    </div>
    <div class="info" id="status">Suche Länder...</div>

    <script>
        // Kleiner Trick: Wir laden die Karte von einer Quelle, 
        // die oft nicht blockiert wird, oder nutzen ein fertiges SVG.
        window.onload = function() {
            const besuchteIDs = MEINE_REISEN.map(r => r.id.toUpperCase());
            // Hier kommt die Logik rein, die die Pfade einfärbt.
            // Falls die Karte immer noch nicht lädt, liegt es an der fehlenden SVG-Datei.
            document.getElementById('status').innerText = `Bereit für ${besuchteIDs.length} Länder.`;
        };
    </script>
</body>
</html>
