<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Weltkarte</title>
    
    <script src="daten.js"></script>
    
    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

    <style>
        :root { --accent: #e67e22; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; font-size: 1.5rem; color: var(--accent); margin-right: 15px; }
        
        #chartdiv {
            width: 100%;
            height: 500px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .info { margin-top: 15px; color: #7f8c8d; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>Meine Weltkarte 🌍</h1>
    </div>

    <div id="chartdiv"></div>
    <div class="info" id="stats">Lade Karte...</div>

    <script>
        // 1. Karte initialisieren
        am5.ready(function() {
            var root = am5.Root.new("chartdiv");
            root.setThemes([am5themes_Animated.new(root)]);

            var chart = root.container.children.push(am5map.MapChart.new(root, {
                panX: "translateX",
                panY: "translateY",
                projection: am5map.geoMercator()
            }));

            var polygonSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {
                geoJSON: am5geodata_worldLow,
                exclude: ["AQ"] // Antarktis ausblenden
            }));

            // 2. Deine besuchten Länder vorbereiten
            // Wir müssen die Klarnamen aus daten.js in die Karte matchen
            const besuchteNamen = MEINE_REISEN.map(t => t.Land);
            
            polygonSeries.mapPolygons.template.setAll({
                tooltipText: "{name}",
                templateField: "polygonSettings",
                fill: am5.color(0xd1d8e0),
                stroke: am5.color(0xffffff)
            });

            // 3. Länder einfärben
            polygonSeries.events.on("datavalidated", function() {
                polygonSeries.mapPolygons.each(function(polygon) {
                    var name = polygon.dataItem.get("name");
                    // Checke ob der Name in deiner Liste ist
                    if (besuchteNamen.includes(name)) {
                        polygon.set("fill", am5.color(0xe67e22));
                    }
                });
                document.getElementById('stats').innerText = 
                    `Länder in deiner Liste: ${besuchteNamen.length}`;
            });

        }); // Ende am5.ready
    </script>
</body>
</html>
