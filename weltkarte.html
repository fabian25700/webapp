<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        #map { flex: 1; width: 100%; }
        .back-link { text-decoration: none; margin-right: 15px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <a href="laender.html" class="back-link">←</a>
        <h1 style="margin:0; font-size: 1.1rem;">Interaktive Karte</h1>
    </header>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const besuchteLaender = ["Deutschland", "Spanien", "Frankreich", "Niederlande", "Schweiz", "Griechenland", "Italien", "Türkei", "England", "Schweden", "Vatikan", "Vereinigte Arabische Emirate", "Dänemark", "Luxemburg", "Österreich", "Belgien", "Malta", "Gibraltar", "Marokko", "Ungarn", "Portugal", "Norway", "Litauen", "USA", "Slowakei", "Mauritius", "Lettland", "Zypern"];
        
        // Dolmetscher für die Karte (GeoJSON Namen zu deiner Liste)
        const mapping = {
            "United States of America": "USA",
            "United Kingdom": "England",
            "Vatican City": "Vatikan",
            "Latvia": "Lettland",
            "Cyprus": "Zypern",
            "Norway": "Norway",
            "Germany": "Deutschland",
            "Spain": "Spanien",
            "France": "Frankreich",
            "Netherlands": "Niederlande",
            "Switzerland": "Schweiz",
            "Italy": "Italien",
            "Greece": "Griechenland",
            "Turkey": "Türkei",
            "United Arab Emirates": "Vereinigte Arabische Emirate",
            "Austria": "Österreich",
            "Belgium": "Belgien",
            "Hungary": "Ungarn",
            "Lithuania": "Litauen",
            "Slovakia": "Slowakei"
        };

        const map = L.map('map').setView([30, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function style(feature) {
            const geoName = feature.properties.name;
            const istBesucht = besuchteLaender.includes(geoName) || 
                              besuchteLaender.includes(mapping[geoName]);

            return {
                fillColor: istBesucht ? '#2ecc71' : '#ff4d4d',
                weight: 1, opacity: 1, color: 'white', fillOpacity: 0.6
            };
        }

        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: style,
                    onEachFeature: (f, l) => l.bindPopup(f.properties.name)
                }).addTo(map);
            });
    </script>
</body>
</html>
