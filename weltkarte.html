<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, sans-serif; background: #f8fafc; }
        header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #e2e8f0; z-index: 1000; }
        #map { flex: 1; width: 100%; background: #aad3df; }
        .back-link { text-decoration: none; margin-right: 15px; font-size: 1.5rem; color: #e67e22; font-weight: bold; }
        h1 { margin: 0; font-size: 1.1rem; color: #1e293b; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-link">←</a>
        <h1>Meine Reisekarte 🌍</h1>
    </header>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([30, 10], 2); 
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Such-Logik: Findet den Eintrag in deiner daten.js
        function findeInfo(feature) {
            const p = feature.properties;
            
            // 1. Suche über ISO-Code (Sicherste Methode)
            // GeoJSON nutzt oft ISO_A2, ISO_A3 oder ADM0_A3
            const geoID = (p.ISO_A2 || p.iso_a2 || p.ISO_A2_EH || "").toUpperCase();
            
            // 2. Suche über Name (Englisch vs Deutsch Mapping)
            const geoName = (p.ADMIN || p.name || "").toLowerCase();

            return MEINE_REISEN.find(r => {
                const datenID = r.id.toUpperCase();
                const datenLand = r.Land.toLowerCase();

                return datenID === geoID || 
                       datenLand === geoName ||
                       // Manuelles Backup für häufige Abweichungen
                       (geoName === "germany" && datenLand === "deutschland") ||
                       (geoName === "spain" && datenLand === "spanien") ||
                       (geoName === "switzerland" && datenLand === "schweiz") ||
                       (geoName === "italy" && datenLand === "italien") ||
                       (geoName === "france" && datenLand === "frankreich") ||
                       (geoName === "united kingdom" && datenLand === "england") ||
                       (geoName === "greece" && datenLand === "griechenland") ||
                       (geoName === "turkey" && datenLand === "türkei") ||
                       (geoName === "sweden" && datenLand === "schweden") ||
                       (geoName === "denmark" && datenLand === "dänemark") ||
                       (geoName === "norway" && datenLand === "norwegen") ||
                       (geoName === "lithuania" && datenLand === "litauen") ||
                       (geoName === "latvia" && datenLand === "lettland") ||
                       (geoName === "austria" && datenLand === "österreich") ||
                       (geoName === "belgium" && datenLand === "belgien") ||
                       (geoName === "portugal" && datenLand === "portugal") ||
                       (geoName === "united states of america" && datenLand === "usa") ||
                       (geoName === "morocco" && datenLand === "marokko")
            });
        }

        function style(feature) {
            const info = findeInfo(feature);
            return {
                fillColor: info ? '#e67e22' : '#ffffff',
                weight: 1, color: '#bdc3c7', opacity: 1,
                fillOpacity: info ? 0.8 : 0.5
            };
        }

        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: style,
                    onEachFeature: (f, l) => {
                        const info = findeInfo(f);
                        if (info) {
                            l.bindPopup(`<b>${info.Land}</b><br>🏨 ${info.Übernachtungen} Nächte<br>🏃 ${info.km_gejoggt} km`);
                        } else {
                            l.bindPopup(`<b>${f.properties.ADMIN || f.properties.name}</b><br>Noch nicht besucht`);
                        }
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
