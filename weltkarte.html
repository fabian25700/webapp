<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, sans-serif; background: #f8fafc; }
        header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #e2e8f0; }
        #map { flex: 1; width: 100%; z-index: 1; background: #aad3df; }
        .back-link { text-decoration: none; margin-right: 15px; font-size: 1.5rem; color: #2563eb; font-weight: bold; }
        h1 { margin: 0; font-size: 1.1rem; color: #1e293b; }
    </style>
</head>
<body>
    <header>
        <a href="laender.html" class="back-link">←</a>
        <h1>Interaktive Karte</h1>
    </header>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Deine Liste
        const besuchteLaender = ["Deutschland", "Germany", "Spanien", "Spain", "Frankreich", "France", "Niederlande", "Netherlands", "Schweiz", "Switzerland", "Griechenland", "Greece", "Italien", "Italy", "Türkei", "Turkey", "England", "United Kingdom", "Schweden", "Sweden", "Vatikan", "Vatican City", "Vereinigte Arabische Emirate", "United Arab Emirates", "Dänemark", "Denmark", "Luxemburg", "Luxembourg", "Österreich", "Austria", "Belgien", "Belgium", "Malta", "Gibraltar", "Marokko", "Morocco", "Ungarn", "Hungary", "Portugal", "Norway", "Norwegen", "Litauen", "Lithuania", "USA", "United States of America", "Slowakei", "Slovakia", "Mauritius", "Lettland", "Latvia", "Zypern", "Cyprus"];
        
        // Mapping für die Karte
        const mapping = {
            "Germany": "Deutschland",
            "Spain": "Spanien",
            "France": "Frankreich",
            "Netherlands": "Niederlande",
            "Switzerland": "Schweiz",
            "Greece": "Griechenland",
            "Italy": "Italien",
            "Turkey": "Türkei",
            "United Kingdom": "England",
            "Sweden": "Schweden",
            "Denmark": "Dänemark",
            "Luxembourg": "Luxemburg",
            "Austria": "Österreich",
            "Belgium": "Belgien",
            "Norway": "Norwegen",
            "Lithuania": "Litauen",
            "United States of America": "USA",
            "Slovakia": "Slowakei",
            "Latvia": "Lettland",
            "Cyprus": "Zypern",
            "Morocco": "Marokko",
            "Hungary": "Ungarn"
        };

        const map = L.map('map').setView([45, 10], 3); // Fokus mehr auf Europa beim Start
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        function style(feature) {
            const geoName = feature.properties.name;
            
            // Wir prüfen, ob der Name aus dem GeoJSON (z.B. "Sweden") in deiner Liste ist
            // oder ob unsere deutsche Übersetzung (z.B. "Schweden") in deiner Liste ist
            const istBesucht = besuchteLaender.some(land => 
                land.toLowerCase() === geoName.toLowerCase() || 
                (mapping[geoName] && mapping[geoName].toLowerCase() === land.toLowerCase())
            );

            return {
                fillColor: istBesucht ? '#2ecc71' : '#ff4d4d',
                weight: 1,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.7
            };
        }

        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: style,
                    onEachFeature: (f, l) => {
                        const name = mapping[f.properties.name] || f.properties.name;
                        l.bindPopup(`<b>${name}</b>`);
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
