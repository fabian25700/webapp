<!DOCTYPE html>
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, sans-serif; background: #f8fafc; }
        header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #e2e8f0; z-index: 1000; }
        #map { flex: 1; width: 100%; z-index: 1; background: #aad3df; }
        .back-link { text-decoration: none; margin-right: 15px; font-size: 1.5rem; color: #e67e22; font-weight: bold; }
        h1 { margin: 0; font-size: 1.1rem; color: #1e293b; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-link">←</a>
        <h1>Meine Reisekarte 🌍</h1>
    </header>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Wir holen uns alle besuchten IDs aus der daten.js
        const besuchteIDs = MEINE_REISEN.map(r => r.id.toUpperCase());

        // Karte initialisieren
        const map = L.map('map').setView([30, 10], 2); 
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Styling-Funktion: Prüft die ID des Landes auf der Karte
        function style(feature) {
            // ISO_A2 ist der Standard-Code (DE, US, etc.) in der GeoJSON Datei
            const iso = feature.properties.ISO_A2 || feature.properties.iso_a2 || feature.id;
            const istBesucht = iso && besuchteIDs.includes(iso.toUpperCase());

            return {
                fillColor: istBesucht ? '#e67e22' : '#ffffff', // Orange für besucht, Weiß für Rest
                weight: 1,
                opacity: 1,
                color: '#bdc3c7',
                fillOpacity: 0.8
            };
        }

        // Laden der Ländergrenzen
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: style,
                    onEachFeature: (f, l) => {
                        const landInfo = MEINE_REISEN.find(r => r.id.toUpperCase() === (f.properties.ISO_A2 || "").toUpperCase());
                        if (landInfo) {
                            l.bindPopup(`<b>${landInfo.Land}</b><br>${landInfo.Übernachtungen} Nächte<br>${landInfo.km_gejoggt} km gelaufen`);
                        } else {
                            l.bindPopup(`<b>${f.properties.ADMIN}</b><br>Noch nicht besucht`);
                        }
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
