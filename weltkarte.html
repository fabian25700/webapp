<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <style>
        :root { --accent: #e67e22; --bg: #f0f2f5; --land: #d1d8e0; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; font-size: 1.5rem; color: var(--accent); margin-right: 15px; }
        
        #map-box { background: white; padding: 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 1000px; margin: 0 auto; }
        svg { width: 100%; height: auto; }
        path { fill: var(--land); stroke: #ffffff; stroke-width: 0.5; transition: fill 0.3s; }
        .visited { fill: var(--accent) !important; }
        .info { margin-top: 15px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>Weltkarte</h1>
    </div>

    <div id="map-box">
        <div id="svg-holder">Lade Karte...</div>
    </div>
    <div class="info" id="status">Berechne Länder...</div>

    <script>
        async function loadMap() {
            try {
                // Wir nutzen eine Karte, die ISO-Codes als IDs verwendet
                const res = await fetch('https://raw.githubusercontent.com/djaiss/mapsicon/master/all/world/vector.svg');
                const svg = await res.text();
                document.getElementById('svg-holder').innerHTML = svg;

                // Alle IDs aus deiner daten.js holen (DE, CH, ES...)
                const besuchteIDs = MEINE_REISEN.map(r => r.id.toUpperCase());

                // Alle Pfade im SVG prüfen
                const paths = document.querySelectorAll('path');
                let found = 0;

                paths.forEach(path => {
                    // Die ID im SVG ist oft das Länderkürzel
                    const pathId = (path.id || path.getAttribute('data-id') || "").toUpperCase();
                    
                    if (besuchteIDs.includes(pathId)) {
                        path.classList.add('visited');
                        found++;
                    }
                });

                document.getElementById('status').innerText = `Markierte Länder: ${found} von ${besuchteIDs.length}`;
            } catch (e) {
                document.getElementById('status').innerText = "Kartenfehler. Prüfe Internetverbindung.";
            }
        }
        window.onload = loadMap;
    </script>
</body>
</html>
