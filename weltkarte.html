<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Weltkarte</title>
    <script src="daten.js"></script>
    <style>
        :root { --accent: #e67e22; --bg: #f0f2f5; --land-default: #d1d8e0; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; font-size: 1.5rem; color: var(--accent); margin-right: 15px; }
        
        /* Karten-Container */
        #map-container {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 1000px;
            margin: 0 auto;
        }

        /* SVG Styling */
        svg { width: 100%; height: auto; border-radius: 20px; }
        
        /* Die Länder-Farben */
        .land { fill: var(--land-default); transition: fill 0.3s; stroke: #fff; stroke-width: 0.5; }
        .visited { fill: var(--accent) !important; } /* Farbe für besuchte Länder */

        .info-box {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>Meine Weltkarte 🌍</h1>
    </div>

    <div id="map-container">
        <div id="canvas">
            </div>
    </div>

    <div class="info-box">
        <p id="stats-text">Lade Karte...</p>
    </div>

    <script>
        // Diese Funktion färbt die Länder ein
        function colorMap() {
            // 1. Alle besuchten Ländernamen aus der daten.js holen
            const besuchteLaender = MEINE_REISEN.map(trip => trip.Land);
            
            // 2. Alle Pfade (Länder) im SVG suchen
            // Hinweis: Dein SVG muss die Ländernamen als "id" oder "data-name" haben
            const paths = document.querySelectorAll('path');
            
            let count = 0;
            paths.forEach(path => {
                const name = path.getAttribute('name') || path.getAttribute('id');
                
                if (besuchteLaender.includes(name)) {
                    path.classList.add('visited');
                    count++;
                }
            });

            document.getElementById('stats-text').innerText = 
                `Du hast bereits ${besuchteLaender.length} Länder besucht und in der Karte markiert!`;
        }

        /* Da ein komplettes Weltkarten-SVG tausende Zeilen Code hat, 
           empfehle ich, eine "simple-world.svg" Datei zu nutzen.
           In diesem Beispiel laden wir eine Karte per Fetch:
        */
        fetch('https://raw.githubusercontent.com/djaiss/mapsicon/master/all/world/vector.svg')
            .then(response => response.text())
            .then(svgData => {
                document.getElementById('canvas').innerHTML = svgData;
                // Wichtig: In dieser SVG-Quelle heißen die IDs oft Kürzel (DE, US).
                // Damit es klappt, müssen wir deine daten.js evtl. um ISO-Codes ergänzen
                // ODER wir nutzen ein SVG, das Klarnamen verwendet.
                colorMap();
            });
    </script>
</body>
</html>
