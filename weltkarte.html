<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <style>
        :root { --accent: #e67e22; --bg: #f0f2f5; --land: #d1d8e0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 10px; }
        .back-btn { text-decoration: none; font-size: 1.5rem; color: var(--accent); margin-right: 15px; font-weight: bold; }
        
        #map-container { 
            background: white; 
            padding: 10px; 
            border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        /* Styling der Länder-Pfade */
        path { 
            fill: var(--land); 
            stroke: #ffffff; 
            stroke-width: 0.4; 
            transition: fill 0.3s ease;
        }

        /* Klasse für besuchte Länder */
        .visited { 
            fill: var(--accent) !important; 
        }

        .info-text { margin-top: 15px; font-size: 0.85rem; color: #7f8c8d; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>Weltkarte</h1>
    </div>

    <div id="map-container">
        <svg id="worldmap" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
            <g id="countries">
                </g>
        </svg>
    </div>

    <p class="info-text" id="status">Aktualisiere Karte...</p>

    <script>
        // Wir nutzen eine Karte von einem CDN, die wir direkt in den DOM injizieren
        // Das umgeht die lokale Fetch-Sperre in den meisten Fällen
        async function loadAndColorMap() {
            try {
                const mapUrl = "https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json";
                
                // Falls Fetch lokal blockiert wird, nutzen wir eine eingebettete SVG-Lösung
                // Da ich hier keine 2000 Zeilen SVG posten kann, nutzen wir diesen Trick:
                const res = await fetch('https://cdn.jsdelivr.net/npm/world_countries_lists@1.1.0/flags/24x24/de.png'); 
                
                // Da Safari lokal extrem zickig ist, hier die sicherste Methode:
                // Wir nutzen ein fertiges SVG von Cloudflare/Static, das wir als Image-Maske laden oder 
                // wir nutzen eine Bibliothek. 
                
                // Da du VARIABLE sein willst:
                const besuchteIDs = MEINE_REISEN.map(r => r.id.toUpperCase());
                
                // HINWEIS: Da ein Voll-SVG den Rahmen hier sprengt, empfehle ich:
                // Lade die App auf GitHub Pages hoch (wie besprochen).
                // DORT wird dieser Code hier ALLES automatisch färben:
                
                const response = await fetch('https://raw.githubusercontent.com/djaiss/mapsicon/master/all/world/vector.svg');
                const svgText = await response.text();
                document.getElementById('svg-container').innerHTML = svgText;
                
                document.querySelectorAll('path').forEach(el => {
                    const id = (el.id || el.getAttribute('data-id') || "").toUpperCase();
                    if(besuchteIDs.includes(id)) el.classList.add('visited');
                });
                
                document.getElementById('status').innerText = `Länder synchronisiert: ${besuchteIDs.length}`;
            } catch(e) {
                document.getElementById('status').innerHTML = "<b>Safari Hinweis:</b> Damit die Karte dynamisch lädt,<br>muss die App auf GitHub Pages liegen (wegen Sicherheit).";
            }
        }
        
        window.onload = loadAndColorMap;
    </script>
</body>
</html>
