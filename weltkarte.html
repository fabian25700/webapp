<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <style>
        :root { --accent: #e67e22; --bg: #f0f2f5; --land: #d1d8e0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 15px; }
        .back-btn { text-decoration: none; font-size: 1.5rem; color: var(--accent); margin-right: 15px; }
        #map-box { background: white; padding: 10px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 1000px; margin: 0 auto; overflow: hidden; }
        svg { width: 100%; height: auto; display: block; }
        path { fill: var(--land); stroke: #ffffff; stroke-width: 0.6; transition: fill 0.5s ease; }
        .visited { fill: var(--accent) !important; }
        .info { margin-top: 15px; font-weight: bold; color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header"><a href="index.html" class="back-btn">←</a><h1>Weltkarte</h1></div>
    <div id="map-box"><div id="svg-holder">Karte wird geladen...</div></div>
    <div class="info" id="status">Suche Länder...</div>

    <script>
        async function loadMap() {
            try {
                // Diese Karte nutzt ISO-Codes (DE, US, FR...) als IDs
                const res = await fetch('https://raw.githubusercontent.com/djaiss/mapsicon/master/all/world/vector.svg');
                const svgData = await res.text();
                document.getElementById('svg-holder').innerHTML = svgData;

                const besuchteIDs = MEINE_REISEN.map(r => r.id.toUpperCase());
                const paths = document.querySelectorAll('path');
                let found = 0;

                paths.forEach(path => {
                    const id = (path.id || path.getAttribute('data-id') || "").toUpperCase();
                    if (besuchteIDs.includes(id)) {
                        path.classList.add('visited');
                        found++;
                    }
                });
                document.getElementById('status').innerText = `Länder markiert: ${found}`;
            } catch (e) {
                document.getElementById('status').innerText = "Fehler beim Laden der Karte.";
            }
        }
        window.onload = loadMap;
    </script>
</body>
</html>
