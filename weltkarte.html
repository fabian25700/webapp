<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, sans-serif; background: #f8fafc; }
        header { background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; z-index: 1000; }
        #map { flex: 1; width: 100%; background: #aad3df; }
        .back-link { text-decoration: none; font-size: 1.5rem; color: #e67e22; font-weight: bold; margin-right: 15px; }
    </style>
</head>
<body>
    <header><a href="index.html" class="back-link">←</a><h1>Reisekarte</h1></header>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([30, 10], 2); 
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        function style(feature) {
            const geoName = feature.properties.name || feature.properties.ADMIN || "";
            // Prüfen, ob dieser englische Name in unserer name_en Spalte existiert
            const istBesucht = MEINE_REISEN.some(r => r.name_en.toLowerCase() === geoName.toLowerCase());

            return {
                fillColor: istBesucht ? '#e67e22' : '#ffffff',
                weight: 1, color: '#bdc3c7', fillOpacity: istBesucht ? 0.8 : 0.5
            };
        }

        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: style,
                    onEachFeature: (f, l) => {
                        const geoName = f.properties.name || f.properties.ADMIN || "";
                        const info = MEINE_REISEN.find(r => r.name_en.toLowerCase() === geoName.toLowerCase());
                        if (info) {
                            l.bindPopup(`<b>${info.Land}</b><br>🏨 ${info.Übernachtungen} Nächte<br>🏃 ${info.km_gejoggt} km`);
                        }
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
