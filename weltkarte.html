<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weltkarte</title>
    <script src="daten.js"></script>
    <style>
        :root { --accent: #e67e22; --bg: #f0f2f5; --land-frei: #d1d8e0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; font-size: 1.5rem; color: var(--accent); margin-right: 15px; }
        
        #map-wrapper {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Das ist wichtig für die Einfärbung */
        path { 
            fill: var(--land-frei); 
            stroke: #ffffff; 
            stroke-width: 0.5; 
            transition: fill 0.4s; 
        }

        /* Die Klasse, die wir per Script vergeben */
        .visited { 
            fill: var(--accent) !important; 
        }

        .stats-info { margin-top: 20px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h1>Weltkarte</h1>
    </div>

    <div id="map-wrapper">
        <div id="svg-container">
            </div>
    </div>

    <p class="stats-info" id="status">Lade Karte...</p>

    <script>
        async function initMap() {
            try {
                // Wir laden eine zuverlässige Weltkarte
                const response = await fetch('https://raw.githubusercontent.com/djaiss/mapsicon/master/all/world/vector.svg');
                let svgText = await response.text();
                
                document.getElementById('svg-container').innerHTML = svgText;
                
                // Jetzt die Logik zum Einfärben
                const besuchteLaender = MEINE_REISEN.map(r => r.Land);
                const paths = document.querySelectorAll('path');
                let gefundeneLaender = 0;

                paths.forEach(path => {
                    // Wir prüfen 'id', 'name' und 'data-name' (Safari Support)
                    const landName = path.getAttribute('name') || path.id;
                    
                    if (besuchteLaender.includes(landName)) {
                        path.classList.add('visited');
                        gefundeneLaender++;
                    }
                });

                document.getElementById('status').innerText = 
                    `Länder besucht: ${besuchteLaender.length} | Auf Karte markiert: ${gefundeneLaender}`;

            } catch (err) {
                document.getElementById('status').innerText = "Karte konnte nicht geladen werden.";
                console.error(err);
            }
        }

        // Starten
        window.onload = initMap;
    </script>
</body>
</html>
